<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Cities Craft · 主页</title>
    <link rel="icon" type="image/png" href="/icon/icon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #FFF5E6;
            font-family: '微软雅黑', 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            position: relative;
        }

        .language-selector {
            position: fixed;
            top: 20px;
            right: 24px;
            z-index: 200;
            background-color: #FFFFFF;
            border: 1px solid #F0E0D0;
            border-radius: 40px;
            padding: 6px 12px;
            display: flex;
            gap: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .lang-btn {
            background: none;
            border: none;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 30px;
            transition: all 0.2s;
            color: #888888;
            font-family: inherit;
        }

        .lang-btn.active {
            background-color: #FF8C42;
            color: white;
        }

        .lang-btn:not(.active):hover {
            background-color: #FFF0E5;
            color: #E67A30;
        }

        .card {
            background-color: #FFFFFF;
            border: 1px solid #F0E0D0;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            width: 500px;
            max-width: 100%;
            padding: 0 28px 36px 28px;
        }

        .top-orange-strip {
            width: calc(100% + 56px);
            margin: 0 -28px 0 -28px;
            height: 6px;
            background-color: #FF8C42;
        }

        .top-white-bar {
            width: calc(100% + 56px);
            margin: 0 -28px 0 -28px;
            background-color: #FFFFFF;
            padding: 12px 28px;
            border-bottom: 1px solid #F0E0D0;
            font-size: 16px;
            font-weight: 600;
            color: #2D2D2D;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            box-sizing: border-box;
        }

        .page-title {
            font-size: 24px;
            font-weight: 700;
            color: #2D2D2D;
            text-align: center;
            margin: 30px 0 20px 0;
        }

        .game-info {
            background-color: #FFF5E6;
            border: 1px solid #F0E0D0;
            border-radius: 16px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }

        .game-info p {
            font-size: 14px;
            color: #2D2D2D;
            line-height: 1.6;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            padding: 8px 16px;
            background-color: #F5F5F5;
            border-radius: 30px;
            text-decoration: none;
            font-size: 13px;
            color: #888888;
            transition: all 0.2s;
        }

        .back-link:hover {
            background-color: #FFF0E5;
            color: #FF8C42;
        }

        @media (max-width: 560px) {
            body {
                padding: 20px 16px;
            }
            .card {
                padding: 0 20px 28px 20px;
            }
            .top-orange-strip {
                width: calc(100% + 40px);
                margin: 0 -20px 0 -20px;
            }
            .top-white-bar {
                width: calc(100% + 40px);
                margin: 0 -20px 0 -20px;
                padding: 10px 20px;
            }
            .language-selector {
                top: 12px;
                right: 16px;
                padding: 4px 8px;
            }
            .lang-btn {
                font-size: 11px;
                padding: 2px 8px;
            }
            .page-title {
                font-size: 20px;
                margin: 20px 0 15px 0;
            }
        }
    </style>
</head>
<body>
    <div class="language-selector">
        <button class="lang-btn" data-lang="zh">中文</button>
        <button class="lang-btn" data-lang="en">English</button>
    </div>

    <div class="card">
        <div class="top-orange-strip"></div>
        <div class="top-white-bar">
            <span id="topTitle">Cities Craft</span>
        </div>

        <div class="page-title" id="pageTitle">🏙️ Cities Craft</div>

        <div class="game-info">
            <p id="gameDesc">这玩意儿是有电脑版的</p>
        </div>

        <a href="/GameList.html" class="back-link" id="backLink">← 返回游戏库</a>
    </div>

    <script>
        const translations = {
            zh: {
                topTitle: "Cities Craft",
                pageTitle: "🏙️ Cities Craft",
                gameDesc: "这玩意儿是有电脑版的",
                backLink: "← 返回游戏库"
            },
            en: {
                topTitle: "Cities Craft",
                pageTitle: "🏙️ Cities Craft",
                gameDesc: "This one has a PC version",
                backLink: "← Back to Game Library"
            }
        };

        let currentLang = 'zh';

        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return null;
        }

        function setCookie(name, value, days) {
            const date = new Date();
            date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
            document.cookie = name + "=" + value + "; expires=" + date.toUTCString() + "; path=/";
        }

        function switchLanguage(lang) {
            currentLang = lang;
            const texts = translations[lang];
            
            document.getElementById('topTitle').textContent = texts.topTitle;
            document.getElementById('pageTitle').textContent = texts.pageTitle;
            document.getElementById('gameDesc').textContent = texts.gameDesc;
            document.getElementById('backLink').textContent = texts.backLink;
            
            setCookie('lang', lang, 30);
        }

        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const lang = btn.getAttribute('data-lang');
                if (!lang) return;
                document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                switchLanguage(lang);
            });
        });

        const savedLang = getCookie('lang');
        if (savedLang && (savedLang === 'zh' || savedLang === 'en')) {
            document.querySelectorAll('.lang-btn').forEach(btn => {
                const lang = btn.getAttribute('data-lang');
                if (lang === savedLang) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            switchLanguage(savedLang);
        }
    </script>
</body>
</html>
