<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FRS · 规则说明</title>
    <link rel="icon" type="image/png" href="/icon/icon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #FFF5E6;
            font-family: '微软雅黑', 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            position: relative;
        }

        .language-selector {
            position: fixed;
            top: 20px;
            right: 24px;
            z-index: 200;
            background-color: #FFFFFF;
            border: 1px solid #F0E0D0;
            border-radius: 40px;
            padding: 6px 12px;
            display: flex;
            gap: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .lang-btn {
            background: none;
            border: none;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 30px;
            transition: all 0.2s;
            color: #888888;
            font-family: inherit;
        }

        .lang-btn.active {
            background-color: #FF8C42;
            color: white;
        }

        .lang-btn:not(.active):hover {
            background-color: #FFF0E5;
            color: #E67A30;
        }

        .card {
            background-color: #FFFFFF;
            border: 1px solid #F0E0D0;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            width: 550px;
            max-width: 100%;
            padding: 0 28px 36px 28px;
        }

        .top-orange-strip {
            width: calc(100% + 56px);
            margin: 0 -28px 0 -28px;
            height: 6px;
            background-color: #FF8C42;
        }

        .top-white-bar {
            width: calc(100% + 56px);
            margin: 0 -28px 0 -28px;
            background-color: #FFFFFF;
            padding: 12px 28px;
            border-bottom: 1px solid #F0E0D0;
            font-size: 16px;
            font-weight: 600;
            color: #2D2D2D;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            box-sizing: border-box;
        }

        .page-title {
            font-size: 24px;
            font-weight: 700;
            color: #2D2D2D;
            text-align: center;
            margin: 30px 0 20px 0;
        }

        .content {
            font-size: 15px;
            line-height: 1.8;
            color: #2D2D2D;
            margin: 20px 0;
        }

        .content p {
            margin-bottom: 8px;
        }

        .rule-section {
            margin-bottom: 20px;
        }

        .rule-title {
            font-weight: 700;
            font-size: 16px;
            color: #FF8C42;
            margin-bottom: 10px;
            margin-top: 15px;
        }

        .rule-list {
            padding-left: 20px;
        }

        .rule-list li {
            margin-bottom: 6px;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            padding: 8px 16px;
            background-color: #F5F5F5;
            border-radius: 30px;
            text-decoration: none;
            font-size: 13px;
            color: #888888;
            transition: all 0.2s;
        }

        .back-link:hover {
            background-color: #FFF0E5;
            color: #FF8C42;
        }

        @media (max-width: 560px) {
            body {
                padding: 20px 16px;
            }
            .card {
                padding: 0 20px 28px 20px;
            }
            .top-orange-strip {
                width: calc(100% + 40px);
                margin: 0 -20px 0 -20px;
            }
            .top-white-bar {
                width: calc(100% + 40px);
                margin: 0 -20px 0 -20px;
                padding: 10px 20px;
            }
            .language-selector {
                top: 12px;
                right: 16px;
                padding: 4px 8px;
            }
            .lang-btn {
                font-size: 11px;
                padding: 2px 8px;
            }
            .page-title {
                font-size: 20px;
                margin: 20px 0 15px 0;
            }
            .content {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="language-selector">
        <button class="lang-btn active" data-lang="zh">中文</button>
        <button class="lang-btn" data-lang="en">English</button>
    </div>

    <div class="card">
        <div class="top-orange-strip"></div>
        <div class="top-white-bar">
            <span data-key="title">规则说明</span>
        </div>

        <div class="page-title" data-key="pageTitle">📜 规则</div>

        <div class="content">
            <div class="rule-section">
                <div class="rule-title" data-key="ruleTitle">一、违规直接淘汰（不再局内，进局立即淘汰）</div>
                <ul class="rule-list" data-key="ruleList">
                    <li data-key="rule1">1. 打78</li>
                    <li data-key="rule2">2. 打头</li>
                    <li data-key="rule3">3. 假活，不死</li>
                    <li data-key="rule4">4. 假举报</li>
                    <li data-key="rule5">5. 进入敌方阵营</li>
                    <li data-key="rule6">6. 无视无敌</li>
                    <li data-key="rule7">7. 打没弹药的</li>
                    <li data-key="rule8">8. 不让无敌</li>
                    <li data-key="rule9">9. 伤害他人</li>
                </ul>
            </div>
        </div>

        <a href="/Games/List/02.html" class="back-link" data-key="backLink">← 返回 FRS</a>
    </div>

    <script>
        const translations = {
            zh: {
                title: "规则说明",
                pageTitle: "📜 规则",
                ruleTitle: "一、违规直接淘汰（不再局内，进局立即淘汰）",
                rule1: "1. 打78",
                rule2: "2. 打头",
                rule3: "3. 假活，不死",
                rule4: "4. 假举报",
                rule5: "5. 进入敌方阵营",
                rule6: "6. 无视无敌",
                rule7: "7. 打没弹药的",
                rule8: "8. 不让无敌",
                rule9: "9. 伤害他人",
                backLink: "← 返回 FRS"
            },
            en: {
                title: "Rules",
                pageTitle: "📜 Rules",
                ruleTitle: "1. Direct disqualification for violations (eliminated immediately upon entering)",
                rule1: "1. Hitting 78",
                rule2: "2. Hitting the head",
                rule3: "3. Fake alive, not dying",
                rule4: "4. False reporting",
                rule5: "5. Entering enemy territory",
                rule6: "6. Ignoring invincibility",
                rule7: "7. Hitting those without ammo",
                rule8: "8. Blocking invincibility",
                rule9: "9. Harming others",
                backLink: "← Back to FRS"
            }
        };

        let currentLang = 'zh';

        function switchLanguage(lang) {
            currentLang = lang;
            const texts = translations[lang];
            
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if (texts[key]) {
                    if (el.tagName === 'UL') {
                        // 对于列表，需要单独处理子项
                        return;
                    }
                    el.textContent = texts[key];
                }
            });
            
            // 单独处理列表项
            const ruleItems = document.querySelectorAll('.rule-list li');
            for (let i = 0; i < ruleItems.length; i++) {
                const key = `rule${i + 1}`;
                if (texts[key]) {
                    ruleItems[i].textContent = texts[key];
                }
            }
        }

        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const lang = btn.getAttribute('data-lang');
                if (!lang) return;
                document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                switchLanguage(lang);
            });
        });
    </script>
</body>
</html>
