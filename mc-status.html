<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MC服务器状态查询</title>
    <link rel="icon" type="image/png" href="/icon/icon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #FFF5E6;
            --card-bg: #FFFFFF;
            --card-border: #F0E0D0;
            --text-primary: #2D2D2D;
            --text-secondary: #888888;
            --text-link: #AAAAAA;
            --accent: #FF8C42;
            --accent-hover: #E67A30;
            --search-bg: #FFFFFF;
            --icon-bg: #FFF0E5;
            --online-color: #27ae60;
            --offline-color: #d32f2f;
        }

        body.dark {
            --bg-color: #000000;
            --card-bg: #1a1a1a;
            --card-border: #333333;
            --text-primary: #eeeeee;
            --text-secondary: #aaaaaa;
            --text-link: #888888;
            --accent: #27ae60;
            --accent-hover: #2ecc71;
            --search-bg: #2a2a2a;
            --icon-bg: #2a2a2a;
            --online-color: #2ecc71;
            --offline-color: #ff6b6b;
        }

        body {
            background-color: var(--bg-color);
            font-family: '微软雅黑', 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            transition: background-color 0.3s;
        }

        .language-selector {
            position: fixed;
            top: 20px;
            right: 24px;
            z-index: 200;
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 40px;
            padding: 6px 12px;
            display: flex;
            gap: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .lang-btn {
            background: none;
            border: none;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 30px;
            color: var(--text-secondary);
            font-family: inherit;
            transition: all 0.2s;
        }
        .lang-btn.active {
            background-color: var(--accent);
            color: #fff;
        }
        .lang-btn:not(.active):hover {
            background-color: var(--icon-bg);
            color: var(--accent);
        }

        .top-left-buttons {
            position: fixed;
            top: 20px;
            left: 24px;
            z-index: 200;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .theme-btn {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 40px;
            padding: 8px 14px;
            font-size: 16px;
            cursor: pointer;
            color: var(--text-primary);
            font-family: inherit;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            transition: all 0.2s;
        }
        .theme-btn:hover {
            background-color: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            width: 560px;
            max-width: 100%;
            padding: 0 28px 36px;
            transition: background-color 0.3s;
        }

        .top-bar {
            background-color: var(--accent);
            height: 6px;
            width: calc(100% + 56px);
            margin: 0 -28px;
        }

        .card-inner {
            padding: 30px 0 20px;
        }

        .title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            text-align: center;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 20px;
        }

        .search-group {
            display: flex;
            gap: 10px;
        }

        .search-input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid var(--card-border);
            border-radius: 8px;
            background: var(--search-bg);
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
            font-family: inherit;
        }
        .search-input:focus {
            border-color: var(--accent);
        }
        .search-input::placeholder {
            color: var(--text-link);
        }

        .big-btn {
            background-color: var(--accent);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            padding: 14px 24px;
            border: none;
            cursor: pointer;
            border-radius: 8px;
            font-family: inherit;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .big-btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }
        .big-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .hint-text {
            color: var(--text-secondary);
            font-size: 11px;
            text-align: center;
            margin: 12px 0 0;
        }

        .divider {
            height: 1px;
            background-color: var(--card-border);
            margin: 20px 0;
        }

        .features {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 16px 0 8px;
        }

        .feature-item {
            font-size: 12px;
            color: var(--text-secondary);
            background: var(--icon-bg);
            padding: 6px 14px;
            border-radius: 20px;
        }

        .preview-area {
            margin: 20px 0;
            display: none;
        }
        .preview-area.show {
            display: block;
        }

        .preview-title {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            font-weight: 500;
            text-align: center;
        }

        .result-card {
            background: var(--icon-bg);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--card-border);
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .result-address {
            font-weight: 700;
            font-size: 18px;
            color: var(--text-primary);
            word-break: break-all;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 14px;
            white-space: nowrap;
            color: #fff;
        }
        .status-online { background: var(--online-color); }
        .status-offline { background: var(--offline-color); }
        .status-unknown { background: var(--text-link); }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--card-border);
            font-size: 14px;
        }
        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: var(--text-secondary);
        }

        .info-value {
            color: var(--text-primary);
            font-weight: 500;
            text-align: right;
            word-break: break-all;
            max-width: 60%;
        }

        .info-value.motd {
            font-weight: 400;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .server-icon {
            text-align: center;
            margin-bottom: 16px;
        }
        .server-icon img {
            max-width: 80px;
            max-height: 80px;
            border-radius: 12px;
            border: 2px solid var(--card-border);
        }
        .no-icon {
            font-size: 48px;
            line-height: 80px;
        }

        .error-message {
            background-color: #fee;
            color: #c00;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            margin: 10px 0;
            display: none;
        }
        body.dark .error-message {
            background-color: #2a1a1a;
            color: #ff6b6b;
        }

        .loading-indicator {
            text-align: center;
            padding: 20px;
            color: var(--accent);
            font-size: 13px;
            display: none;
        }

        .cookie-notice {
            text-align: center;
            font-size: 10px;
            color: var(--text-link);
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid var(--card-border);
        }
        .cookie-notice a {
            color: var(--accent);
            text-decoration: none;
        }
        .cookie-notice a:hover {
            text-decoration: underline;
        }

        .history-section {
            margin-top: 16px;
        }
        .history-title {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .history-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .history-tag {
            padding: 4px 12px;
            background: var(--icon-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            font-size: 11px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }
        .history-tag:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            padding: 8px 16px;
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 30px;
            text-decoration: none;
            font-size: 13px;
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        .back-link:hover {
            background-color: var(--icon-bg);
            color: var(--accent);
        }

        @media (max-width: 560px) {
            body { padding: 20px 16px; }
            .card { padding: 0 20px 28px; }
            .top-bar { width: calc(100% + 40px); margin: 0 -20px; }
            .search-group { flex-direction: column; }
            .big-btn { width: 100%; }
            .result-header { flex-direction: column; align-items: flex-start; }
            .language-selector { top: 12px; right: 16px; padding: 4px 8px; }
            .lang-btn { font-size: 11px; padding: 2px 8px; }
            .top-left-buttons { top: 12px; left: 16px; }
            .theme-btn { padding: 6px 12px; font-size: 14px; }
            .info-row { flex-direction: column; align-items: flex-start; gap: 2px; }
            .info-value { max-width: 100%; text-align: left; }
        }
    </style>
</head>
<body>

<div class="top-left-buttons">
    <button id="themeToggle" class="theme-btn">🌙</button>
</div>

<div class="language-selector">
    <button class="lang-btn active" data-lang="zh">中文</button>
    <button class="lang-btn" data-lang="en">English</button>
</div>

<div class="card">
    <div class="top-bar"></div>
    <div class="card-inner">
        <div class="title" id="pageTitleText">服务器探测</div>
        <div class="subtitle" id="subtitleText">输入域名或IP，查询是否为Minecraft服务器</div>

        <div class="search-group">
            <input type="text" id="serverInput" class="search-input" placeholder="例如: xxx.xxx.xxx:00000">
            <button id="queryBtn" class="big-btn">查询</button>
        </div>
        <div class="hint-text" id="hintText">支持 Java 版服务器 · 实时探测状态</div>

        <div class="divider"></div>

        <div class="features">
            <span class="feature-item" id="feature1">任意域名/IP</span>
            <span class="feature-item" id="feature2">在线/离线检测</span>
            <span class="feature-item" id="feature3">玩家数 &amp; 版本</span>
            <span class="feature-item" id="feature4">服务器标语</span>
        </div>

        <div class="loading-indicator" id="loadingIndicator">正在探测服务器...</div>

        <div id="previewArea" class="preview-area">
            <div class="preview-title" id="previewTitle">探测结果</div>
            <div class="result-card">
                <div class="result-header">
                    <span class="result-address" id="resultAddress">—</span>
                    <span id="statusBadge"></span>
                </div>
                <div id="resultDetails"></div>
            </div>
        </div>

        <div class="history-section">
            <div class="history-title" id="historyTitle">最近查询</div>
            <div class="history-tags" id="historyTags"></div>
        </div>

        <a href="/" class="back-link" id="backLink">返回主页</a>

        <div class="cookie-notice" id="cookieNotice">
            如果你没有同意 Cookie，自定义选项不会被保存，点击 <a href="/">这里</a> 同意 cookie
        </div>
    </div>
</div>

<script>
const translations = {
    zh: {
        pageTitle: "MC服务器状态查询",
        pageTitleText: "服务器探测",
        subtitleText: "输入域名或IP，查询是否为Minecraft服务器",
        hintText: "支持 Java 版服务器 · 实时探测状态",
        feature1: "任意域名/IP",
        feature2: "在线/离线检测",
        feature3: "玩家数 & 版本",
        feature4: "服务器标语",
        previewTitle: "探测结果",
        queryBtn: "查询",
        placeholder: "例如: xxx.xxx.xxx:00000",
        loading: "正在探测服务器...",
        online: "在线",
        offline: "离线",
        unknown: "未知",
        version: "版本",
        players: "玩家",
        motd: "标语",
        playerList: "在线玩家",
        notMcServer: "该地址可能不是Minecraft服务器，或服务器已关闭",
        isMcServer: "确认为 Minecraft 服务器",
        fetchFailed: "请求失败，请检查网络或稍后重试",
        historyTitle: "最近查询",
        backLink: "返回主页",
        cookieNotice: '如果你没有同意 Cookie，自定义选项不会被保存，点击 <a href="/">这里</a> 同意 cookie',
        enterAddress: "请输入一个域名或IP地址"
    },
    en: {
        pageTitle: "MC Server Status Check",
        pageTitleText: "Server Probe",
        subtitleText: "Enter a domain or IP to check if it's a Minecraft server",
        hintText: "Java Edition supported · Real-time status",
        feature1: "Any domain/IP",
        feature2: "Online/Offline check",
        feature3: "Players & Version",
        feature4: "Server MOTD",
        previewTitle: "Result",
        queryBtn: "Query",
        placeholder: "e.g. xxx.xxx.xxx:00000",
        loading: "Probing server...",
        online: "Online",
        offline: "Offline",
        unknown: "Unknown",
        version: "Version",
        players: "Players",
        motd: "MOTD",
        playerList: "Online Players",
        notMcServer: "This address may not be a Minecraft server, or the server is offline",
        isMcServer: "Confirmed as Minecraft server",
        fetchFailed: "Request failed, please check your network and try again",
        historyTitle: "Recent Queries",
        backLink: "Back to Home",
        cookieNotice: 'If you do not consent to cookies, your custom preferences will not be saved, <a href="/">click here</a> to agree',
        enterAddress: "Please enter a domain or IP address"
    }
};

let currentLang = 'zh';
let queryHistory = JSON.parse(localStorage.getItem('mcQueryHistory') || '[]');

function getCookie(name) {
    const v = `; ${document.cookie}`;
    const parts = v.split(`; ${name}=`);
    if (parts.length === 2) return parts.pop().split(';').shift();
    return null;
}

function setCookie(name, value, days) {
    const d = new Date();
    d.setTime(d.getTime() + days * 86400000);
    document.cookie = name + '=' + value + '; expires=' + d.toUTCString() + '; path=/';
}

function initTheme() {
    const saved = getCookie('theme');
    if (saved === 'dark') {
        document.body.classList.add('dark');
        document.getElementById('themeToggle').innerHTML = '☀️';
    } else {
        document.body.classList.remove('dark');
        document.getElementById('themeToggle').innerHTML = '🌙';
    }
}

document.getElementById('themeToggle').addEventListener('click', function() {
    if (document.body.classList.contains('dark')) {
        document.body.classList.remove('dark');
        setCookie('theme', 'light', 30);
        this.innerHTML = '🌙';
    } else {
        document.body.classList.add('dark');
        setCookie('theme', 'dark', 30);
        this.innerHTML = '☀️';
    }
});

function switchLanguage(lang) {
    currentLang = lang;
    const t = translations[lang];

    document.title = t.pageTitle;
    document.getElementById('pageTitleText').textContent = t.pageTitleText;
    document.getElementById('subtitleText').textContent = t.subtitleText;
    document.getElementById('hintText').textContent = t.hintText;
    document.getElementById('feature1').textContent = t.feature1;
    document.getElementById('feature2').textContent = t.feature2;
    document.getElementById('feature3').textContent = t.feature3;
    document.getElementById('feature4').textContent = t.feature4;
    document.getElementById('previewTitle').textContent = t.previewTitle;
    document.getElementById('queryBtn').textContent = t.queryBtn;
    document.getElementById('serverInput').placeholder = t.placeholder;
    document.getElementById('historyTitle').textContent = t.historyTitle;
    document.getElementById('backLink').textContent = t.backLink;
    document.getElementById('loadingIndicator').textContent = t.loading;
    document.getElementById('cookieNotice').innerHTML = t.cookieNotice;

    if (getCookie('cookie_consent') === 'accepted') {
        setCookie('lang', lang, 30);
    }
}

document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        const lang = this.dataset.lang;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        switchLanguage(lang);
    });
});

function showError(msg) {
    let el = document.getElementById('errorMessage');
    if (!el) {
        el = document.createElement('div');
        el.id = 'errorMessage';
        el.className = 'error-message';
        document.querySelector('.card-inner').insertBefore(el, document.getElementById('previewArea'));
    }
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 5000);
}

function parseAddress(input) {
    input = input.trim();
    if (!input) return null;
    if (input.includes(':')) {
        const parts = input.split(':');
        const host = parts[0];
        const port = parseInt(parts[1]);
        if (host && port && !isNaN(port)) {
            return { host, port };
        }
    }
    return { host: input, port: null };
}

async function queryServer(address) {
    const loading = document.getElementById('loadingIndicator');
    const area = document.getElementById('previewArea');
    const btn = document.getElementById('queryBtn');

    loading.style.display = 'block';
    area.classList.remove('show');
    btn.disabled = true;

    try {
        const parsed = parseAddress(address);
        if (!parsed) throw new Error('Invalid');

        let url = `https://api.mcsrvstat.us/2/${encodeURIComponent(parsed.host)}`;
        if (parsed.port) {
            url = `https://api.mcsrvstat.us/2/${encodeURIComponent(parsed.host)}:${parsed.port}`;
        }

        const resp = await fetch(url);
        const data = await resp.json();

        loading.style.display = 'none';
        btn.disabled = false;
        area.classList.add('show');

        saveHistory(address);
        displayResult(address, data);
    } catch (e) {
        loading.style.display = 'none';
        btn.disabled = false;
        area.classList.add('show');
        const t = translations[currentLang];
        document.getElementById('resultAddress').textContent = address;
        document.getElementById('statusBadge').innerHTML = `<span class="status-badge status-unknown">${t.unknown}</span>`;
        document.getElementById('resultDetails').innerHTML = `<div style="color:var(--text-secondary);text-align:center;padding:10px;">${t.fetchFailed}</div>`;
    }
}

function displayResult(address, data) {
    const t = translations[currentLang];
    document.getElementById('resultAddress').textContent = address;

    if (data.online === true) {
        document.getElementById('statusBadge').innerHTML = `<span class="status-badge status-online">${t.online}</span>`;

        let html = '';
        if (data.icon) {
            html += `<div class="server-icon"><img src="${data.icon}" alt="Icon"></div>`;
        } else {
            html += `<div class="server-icon"><span class="no-icon">⛏️</span></div>`;
        }

        html += `<div class="info-row"><span class="info-label">${t.version}</span><span class="info-value">${data.version || '未知'}</span></div>`;
        html += `<div class="info-row"><span class="info-label">${t.players}</span><span class="info-value">${data.players?.online || 0} / ${data.players?.max || '?'}</span></div>`;

        if (data.motd?.clean?.length) {
            html += `<div class="info-row"><span class="info-label">${t.motd}</span><span class="info-value motd">${data.motd.clean.join(' ')}</span></div>`;
        }

        if (data.players?.list?.length) {
            html += `<div class="info-row"><span class="info-label">${t.playerList}</span><span class="info-value">${data.players.list.join(', ')}</span></div>`;
        }

        html += `<div class="info-row" style="margin-top:12px;border-top:2px solid var(--card-border);padding-top:12px;">
            <span style="color:var(--online-color);font-weight:500;">${t.isMcServer}</span>
        </div>`;

        document.getElementById('resultDetails').innerHTML = html;
    } else {
        document.getElementById('statusBadge').innerHTML = `<span class="status-badge status-offline">${t.offline}</span>`;
        document.getElementById('resultDetails').innerHTML = `
            <div class="info-row">
                <span class="info-label">${t.version}</span>
                <span class="info-value" style="color:var(--offline-color);">${t.notMcServer}</span>
            </div>
        `;
    }
}

function saveHistory(addr) {
    queryHistory = queryHistory.filter(item => item !== addr);
    queryHistory.unshift(addr);
    if (queryHistory.length > 10) queryHistory.pop();
    localStorage.setItem('mcQueryHistory', JSON.stringify(queryHistory));
    renderHistory();
}

function renderHistory() {
    const container = document.getElementById('historyTags');
    if (!container) return;
    if (queryHistory.length === 0) {
        container.innerHTML = '<span style="color:var(--text-link);font-size:12px;">暂无查询记录</span>';
        return;
    }
    container.innerHTML = queryHistory.map(addr =>
        `<span class="history-tag" data-address="${addr}">${addr}</span>`
    ).join('');

    container.querySelectorAll('.history-tag').forEach(tag => {
        tag.addEventListener('click', function() {
            const addr = this.dataset.address;
            document.getElementById('serverInput').value = addr;
            queryServer(addr);
        });
    });
}

document.getElementById('queryBtn').addEventListener('click', function() {
    const input = document.getElementById('serverInput').value.trim();
    if (!input) {
        showError(translations[currentLang].enterAddress);
        return;
    }
    queryServer(input);
});

document.getElementById('serverInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('queryBtn').click();
});

const savedLang = getCookie('lang');
if (savedLang === 'zh' || savedLang === 'en') {
    document.querySelectorAll('.lang-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.lang === savedLang);
    });
    switchLanguage(savedLang);
} else {
    switchLanguage('zh');
}

initTheme();
renderHistory();
