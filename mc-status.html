<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>服务器查询</title>
    <link rel="icon" type="image/png" href="/icon/icon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #FFF5E6;
            --card-bg: #FFFFFF;
            --card-border: #F0E0D0;
            --text-primary: #2D2D2D;
            --text-secondary: #888888;
            --text-link: #AAAAAA;
            --accent: #FF8C42;
            --accent-hover: #E67A30;
            --search-bg: #FFFFFF;
            --icon-bg: #FFF0E5;
            --online-color: #27ae60;
            --offline-color: #d32f2f;
            --clear-btn-hover: #b71c1c;
            --copy-success: #27ae60;
        }

        body.dark {
            --bg-color: #000000;
            --card-bg: #1a1a1a;
            --card-border: #333333;
            --text-primary: #eeeeee;
            --text-secondary: #aaaaaa;
            --text-link: #888888;
            --accent: #27ae60;
            --accent-hover: #2ecc71;
            --search-bg: #2a2a2a;
            --icon-bg: #2a2a2a;
            --online-color: #2ecc71;
            --offline-color: #ff6b6b;
            --clear-btn-hover: #c62828;
            --copy-success: #2ecc71;
        }

        body {
            background-color: var(--bg-color);
            font-family: '微软雅黑', 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            transition: background-color 0.3s;
        }

        .language-selector {
            position: fixed;
            top: 20px;
            right: 24px;
            z-index: 200;
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 40px;
            padding: 6px 12px;
            display: flex;
            gap: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .lang-btn {
            background: none;
            border: none;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 30px;
            color: var(--text-secondary);
            font-family: inherit;
            transition: all 0.2s;
        }
        .lang-btn.active {
            background-color: var(--accent);
            color: #fff;
        }
        .lang-btn:not(.active):hover {
            background-color: var(--icon-bg);
            color: var(--accent);
        }

        .top-left-buttons {
            position: fixed;
            top: 20px;
            left: 24px;
            z-index: 200;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .theme-btn {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 40px;
            padding: 8px 14px;
            font-size: 16px;
            cursor: pointer;
            color: var(--text-primary);
            font-family: inherit;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            transition: all 0.2s;
        }
        .theme-btn:hover {
            background-color: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            width: 560px;
            max-width: 100%;
            padding: 0 28px 36px;
            transition: background-color 0.3s;
        }

        .top-bar {
            background-color: var(--accent);
            height: 6px;
            width: calc(100% + 56px);
            margin: 0 -28px;
        }

        .card-inner {
            padding: 30px 0 20px;
        }

        .title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            text-align: center;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 20px;
        }

        .search-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-input {
            flex: 2;
            padding: 14px 18px;
            border: 2px solid var(--card-border);
            border-radius: 8px;
            background: var(--search-bg);
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
            font-family: inherit;
            min-width: 140px;
        }
        .search-input:focus {
            border-color: var(--accent);
        }
        .search-input::placeholder {
            color: var(--text-link);
        }

        .bedrock-inputs {
            display: none;
            flex: 2;
            gap: 8px;
            min-width: 140px;
        }
        .bedrock-inputs.show {
            display: flex;
        }

        .bedrock-host {
            flex: 2;
            padding: 14px 18px;
            border: 2px solid var(--card-border);
            border-radius: 8px;
            background: var(--search-bg);
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
            font-family: inherit;
            min-width: 100px;
        }
        .bedrock-host:focus {
            border-color: var(--accent);
        }
        .bedrock-host::placeholder {
            color: var(--text-link);
        }

        .bedrock-port {
            flex: 0.8;
            padding: 14px 18px;
            border: 2px solid var(--card-border);
            border-radius: 8px;
            background: var(--search-bg);
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
            font-family: inherit;
            min-width: 80px;
            max-width: 120px;
        }
        .bedrock-port:focus {
            border-color: var(--accent);
        }
        .bedrock-port::placeholder {
            color: var(--text-link);
        }

        .search-options {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .search-options label {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }

        .search-options input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .big-btn {
            background-color: var(--accent);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            padding: 14px 24px;
            border: none;
            cursor: pointer;
            border-radius: 8px;
            font-family: inherit;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .big-btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }
        .big-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .hint-text {
            color: var(--text-secondary);
            font-size: 11px;
            text-align: center;
            margin: 12px 0 0;
        }

        .divider {
            height: 1px;
            background-color: var(--card-border);
            margin: 20px 0;
        }

        .features {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 16px 0 8px;
        }

        .feature-item {
            font-size: 12px;
            color: var(--text-secondary);
            background: var(--icon-bg);
            padding: 6px 14px;
            border-radius: 20px;
        }

        .preview-area {
            margin: 20px 0;
            display: none;
        }
        .preview-area.show {
            display: block;
        }

        .preview-title {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            font-weight: 500;
            text-align: center;
        }

        .result-card {
            background: var(--icon-bg);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--card-border);
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .result-address {
            font-weight: 700;
            font-size: 18px;
            color: var(--text-primary);
            word-break: break-all;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 14px;
            white-space: nowrap;
            color: #fff;
        }
        .status-online {
            background: var(--online-color);
        }
        .status-offline {
            background: var(--offline-color);
        }
        .status-unknown {
            background: var(--text-link);
        }

        .info-row {
            display: flex;
            padding: 6px 0;
            border-bottom: 1px solid var(--card-border);
            font-size: 14px;
            gap: 12px;
        }
        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: var(--text-secondary);
            flex-shrink: 0;
            min-width: 70px;
        }

        .info-value {
            color: var(--text-primary);
            font-weight: 500;
            word-break: break-all;
            flex: 1;
        }

        .info-value.motd {
            font-weight: 400;
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.8;
        }

        .info-value.player-list {
            line-height: 1.8;
            max-height: 200px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .info-value.player-list::-webkit-scrollbar {
            width: 6px;
        }
        .info-value.player-list::-webkit-scrollbar-track {
            background: var(--card-border);
            border-radius: 10px;
        }
        .info-value.player-list::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }

        .server-icon {
            text-align: center;
            margin-bottom: 16px;
        }
        .server-icon img {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            border: 2px solid var(--card-border);
            object-fit: cover;
        }

        .extra-info {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--card-border);
        }

        .extra-item {
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .extra-item .val {
            color: var(--text-primary);
            font-weight: 500;
        }

        .copy-btn {
            background: none;
            border: 1px solid var(--accent);
            border-radius: 16px;
            padding: 2px 12px;
            font-size: 12px;
            cursor: pointer;
            color: var(--accent);
            font-family: inherit;
            transition: all 0.2s;
        }
        .copy-btn:hover {
            background: var(--accent);
            color: #fff;
        }
        .copy-btn.copied {
            border-color: var(--copy-success);
            color: var(--copy-success);
        }
        .copy-btn.copied:hover {
            background: var(--copy-success);
            color: #fff;
        }

        .error-message {
            background-color: #fee;
            color: #c00;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            margin: 10px 0;
            display: none;
        }
        body.dark .error-message {
            background-color: #2a1a1a;
            color: #ff6b6b;
        }

        .loading-indicator {
            text-align: center;
            padding: 20px;
            color: var(--accent);
            font-size: 13px;
            display: none;
        }

        .cookie-notice {
            text-align: center;
            font-size: 10px;
            color: var(--text-link);
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid var(--card-border);
        }
        .cookie-notice a {
            color: var(--accent);
            text-decoration: none;
        }
        .cookie-notice a:hover {
            text-decoration: underline;
        }

        .history-section {
            margin-top: 16px;
        }
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .history-title {
            font-size: 12px;
            color: var(--text-secondary);
        }
        .clear-history-btn {
            padding: 4px 12px;
            border: none;
            border-radius: 12px;
            background-color: var(--offline-color);
            color: #fff;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .clear-history-btn:hover {
            background-color: var(--clear-btn-hover);
            transform: scale(1.02);
        }

        .history-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .history-tag {
            padding: 4px 12px;
            background: var(--icon-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            font-size: 11px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }
        .history-tag:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            padding: 8px 16px;
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 30px;
            text-decoration: none;
            font-size: 13px;
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        .back-link:hover {
            background-color: var(--icon-bg);
            color: var(--accent);
        }

        .refresh-indicator {
            text-align: center;
            font-size: 11px;
            color: var(--text-link);
            margin-top: 8px;
            display: none;
        }
        .refresh-indicator.show {
            display: block;
        }

        @media (max-width: 560px) {
            body {
                padding: 20px 16px;
            }
            .card {
                padding: 0 20px 28px;
            }
            .top-bar {
                width: calc(100% + 40px);
                margin: 0 -20px;
            }
            .search-group {
                flex-direction: column;
            }
            .search-options {
                justify-content: flex-start;
            }
            .bedrock-port {
                max-width: 100%;
            }
            .big-btn {
                width: 100%;
            }
            .result-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .language-selector {
                top: 12px;
                right: 16px;
                padding: 4px 8px;
            }
            .lang-btn {
                font-size: 11px;
                padding: 2px 8px;
            }
            .top-left-buttons {
                top: 12px;
                left: 16px;
            }
            .theme-btn {
                padding: 6px 12px;
                font-size: 14px;
            }
            .info-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 2px;
            }
            .info-value {
                text-align: left;
            }
            .info-value.player-list {
                max-height: 150px;
            }
            .bedrock-inputs {
                flex-wrap: wrap;
            }
            .history-header {
                flex-wrap: wrap;
                gap: 8px;
            }
            .extra-info {
                flex-direction: column;
                gap: 6px;
            }
        }
    </style>
</head>

                        <span class="extra-item" id="geoDisplay">🌍 <span id="geoLabel">位置</span>: <span class="val" id="geoValue">--</span></span>

                        <span class="extra-item" id="copyDisplay">
                            <button class="copy-btn" id="copyBtn">📋 <span id="copyLabel">复制地址</span></button>
                        </span>
                    </div>
                </div>
                <div class="refresh-indicator" id="refreshIndicator">🔄 <span id="autoRefreshLabel">每 10 秒自动刷新</span></div>
            </div>

            <div class="history-section">
                <div class="history-header">
                    <div class="history-title" id="historyTitle">最近查询</div>
                    <button id="clearHistoryBtn" class="clear-history-btn"><span id="clearLabel">清空历史</span></button>
                </div>
                <div class="history-tags" id="historyTags"></div>
            </div>

            <a href="/" class="back-link" id="backLink">← 返回主页</a>

            <div class="cookie-notice" id="cookieNotice">
                如果你没有同意 Cookie，自定义选项不会被保存，点击 <a href="/">这里</a> 同意 cookie
            </div>
        </div>
    </div>

                serverName: "Server Name",
                ping: "Ping",
                location: "Location",
                realIp: "Real IP",
                copyAddr: "Copy Address",
                copied: "Copied!",
                unknownLocation: "Unknown",
                ms: "ms",
                pingFrom: "Node"
            }
        };

        let currentLang = 'zh';
        let queryHistory = JSON.parse(localStorage.getItem('mcQueryHistory') || '[]');
        let refreshTimer = null;
        let currentAddress = null;
        let cachedData = null;
        let cachedIsBedrock = false;
        let cachedIp = null;
        let cachedPort = null;
        let cachedFullAddress = null;
        let cachedGeo = null;
        let currentPing = 0;
        let currentPingNode = '';

        function getCookie(name) {
            const v = `; ${document.cookie}`;
            const parts = v.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return null;
        }

        function setCookie(name, value, days) {
            const d = new Date();
            d.setTime(d.getTime() + days * 86400000);
            document.cookie = name + '=' + value + '; expires=' + d.toUTCString() + '; path=/';
        }

        function initTheme() {
            const saved = getCookie('theme');
            if (saved === 'dark') {
                document.body.classList.add('dark');
                document.getElementById('themeToggle').innerHTML = '☀️';
            } else {
                document.body.classList.remove('dark');
                document.getElementById('themeToggle').innerHTML = '🌙';
            }
        }

        document.getElementById('themeToggle').addEventListener('click', function() {
            if (document.body.classList.contains('dark')) {
                document.body.classList.remove('dark');
                setCookie('theme', 'light', 30);
                this.innerHTML = '🌙';
            } else {
                document.body.classList.add('dark');
                setCookie('theme', 'dark', 30);
                this.innerHTML = '☀️';
            }
        });

        function switchLanguage(lang) {
            currentLang = lang;
            const t = translations[lang];

            document.title = t.pageTitle;
            document.getElementById('pageTitleText').textContent = t.pageTitleText;
            document.getElementById('subtitleText').textContent = t.subtitleText;
            document.getElementById('hintText').textContent = t.hintText;
            document.getElementById('feature1').textContent = t.feature1;
            document.getElementById('feature2').textContent = t.feature2;
            document.getElementById('feature3').textContent = t.feature3;
            document.getElementById('feature4').textContent = t.feature4;
            document.getElementById('previewTitle').textContent = t.previewTitle;
            document.getElementById('queryBtn').textContent = t.queryBtn;
            document.getElementById('serverInput').placeholder = t.placeholder;
            document.getElementById('bedrockHost').placeholder = t.bedrockHostPlaceholder;
            document.getElementById('bedrockPort').placeholder = t.bedrockPortPlaceholder;
            document.getElementById('historyTitle').textContent = t.historyTitle;
            document.getElementById('clearLabel').textContent = t.clearHistory;
            document.getElementById('backLink').textContent = t.backLink;
            document.getElementById('loadingIndicator').textContent = t.loading;
            document.getElementById('cookieNotice').innerHTML = t.cookieNotice;
            document.getElementById('autoRefreshLabel').textContent = t.autoRefresh;
            document.getElementById('bedrockLabel').textContent = t.bedrockLabel;
            document.getElementById('copyLabel').textContent = t.copyAddr;
            document.getElementById('pingLabel').textContent = t.ping;
            document.getElementById('geoLabel').textContent = t.location;
            document.getElementById('realIpLabel').textContent = t.realIp;

            if (getCookie('cookie_consent') === 'accepted') {
                setCookie('lang', lang, 30);
            }

            if (cachedData) {
                renderResultCard(currentAddress, cachedData, cachedIsBedrock);
            }
        }

        function renderResultCard(address, data, isBedrock) {
            const t = translations[currentLang];
            document.getElementById('resultAddress').textContent = address;

            if (data.online === true) {
                document.getElementById('statusBadge').innerHTML = `<span class="status-badge status-online">${t.online}</span>`;

                let html = '';

                if (data.icon) {
                    html += `<div class="server-icon"><img src="${data.icon}" alt="Icon"></div>`;
                } else {
                    html += `<div class="server-icon"><img src="https://api.mcsrvstat.us/icon/${encodeURIComponent(address)}" alt="Icon"></div>`;
                }

                if (isBedrock) {
                    if (data.motd?.clean?.length) {
                        let motdText = data.motd.clean.join(' ');
                        motdText = motdText.replace(/\n/g, ' ').replace(/\r/g, ' ').trim();
                        motdText = formatMOTD(motdText);
                        html += `<div class="info-row"><span class="info-label">${t.serverName}</span><span class="info-value motd">${motdText}</span></div>`;
                    }

                    let versionDisplay = data.version || '未知';
                    if (versionDisplay.startsWith('1.')) {
                        const versionNum = parseFloat(versionDisplay);
                        if (versionNum > 1.21) {
                            versionDisplay = versionDisplay.substring(2);
                        }
                    }
                    html += `<div class="info-row"><span class="info-label">${t.version}</span><span class="info-value">${versionDisplay}</span></div>`;
                    html += `<div class="info-row"><span class="info-label">${t.edition}</span><span class="info-value">Bedrock</span></div>`;
                    if (data.gamemode) {
                        const gamemodeMap = { 'Survival': '生存模式', 'Creative': '创造模式', 'Adventure': '冒险模式', 'Spectator': '旁观模式' };
                        let gamemodeDisplay = data.gamemode;
                        if (currentLang === 'zh' && gamemodeMap[data.gamemode]) {
                            gamemodeDisplay = gamemodeMap[data.gamemode];
                        }
                        html += `<div class="info-row"><span class="info-label">${t.gamemode}</span><span class="info-value">${gamemodeDisplay}</span></div>`;
                    }
                    html += `<div class="info-row"><span class="info-label">${t.players}</span><span class="info-value">${data.players?.online || 0} / ${data.players?.max || '?'}</span></div>`;
                } else {
                    html += `<div class="info-row"><span class="info-label">${t.version}</span><span class="info-value">${data.version || '未知'}</span></div>`;
                    if (data.software) {
                        html += `<div class="info-row"><span class="info-label">${t.software}</span><span class="info-value">${data.software}</span></div>`;
                    }
                    html += `<div class="info-row"><span class="info-label">${t.players}</span><span class="info-value">${data.players?.online || 0} / ${data.players?.max || '?'}</span></div>`;
                    if (data.motd?.clean?.length) {
                        let motdText = data.motd.clean.join(' ');
                        motdText = motdText.replace(/\n/g, ' ').replace(/\r/g, ' ').trim();
                        motdText = formatMOTD(motdText);
                        html += `<div class="info-row"><span class="info-label">${t.motd}</span><span class="info-value motd">${motdText}</span></div>`;
                    }
                    if (data.players?.list && data.players.list.length > 0) {
                        let playerNames = data.players.list.map(p => p.name || p).join(', ');
                        playerNames = playerNames.replace(/\n/g, ' ').replace(/\r/g, ' ').trim();
                        const formattedPlayers = formatPlayers(playerNames.split(', '));
                        html += `<div class="info-row"><span class="info-label">${t.playerList}</span><span class="info-value player-list">${formattedPlayers}</span></div>`;
                    }
                    if (data.plugins && data.plugins.length > 0) {
                        const pluginNames = data.plugins.map(p => p.name + (p.version ? ' v' + p.version : '')).join(', ');
                        html += `<div class="info-row"><span class="info-label">${t.plugins}</span><span class="info-value motd">${pluginNames}</span></div>`;
                    }
                    if (data.mods && data.mods.length > 0) {
                        const modNames = data.mods.map(m => m.name + (m.version ? ' v' + m.version : '')).join(', ');
                        html += `<div class="info-row"><span class="info-label">${t.mods}</span><span class="info-value motd">${modNames}</span></div>`;
                    }
                }

                html += `<div class="info-row" style="margin-top:12px;border-top:2px solid var(--card-border);padding-top:12px;">
                    <span style="color:var(--online-color);font-weight:500;">${t.isMcServer}</span>
                </div>`;

                document.getElementById('resultDetails').innerHTML = html;

            } else {
                document.getElementById('statusBadge').innerHTML = `<span class="status-badge status-offline">${t.offline}</span>`;
                let html = '';
                html += `<div class="info-row">
                    <span class="info-label">${t.version}</span>
                    <span class="info-value" style="color:var(--offline-color);">${t.notMcServer}</span>
                </div>`;
                document.getElementById('resultDetails').innerHTML = html;
            }
        }

        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const lang = this.dataset.lang;
                document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                switchLanguage(lang);
            });
        });

        document.getElementById('bedrockCheck').addEventListener('change', function() {
            const inputs = document.getElementById('bedrockInputs');
            const javaInput = document.getElementById('serverInput');
            if (this.checked) {
                inputs.classList.add('show');
                javaInput.style.display = 'none';
                javaInput.value = '';
            } else {
                inputs.classList.remove('show');
                javaInput.style.display = 'block';
                document.getElementById('bedrockHost').value = '';
                document.getElementById('bedrockPort').value = '';
            }
        });

        function showError(msg) {
            let el = document.getElementById('errorMessage');
            if (!el) {
                el = document.createElement('div');
                el.id = 'errorMessage';
                el.className = 'error-message';
                document.querySelector('.card-inner').insertBefore(el, document.getElementById('previewArea'));
            }
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 5000);
        }

        function getAddress() {
            const isBedrock = document.getElementById('bedrockCheck').checked;
            if (isBedrock) {
                const host = document.getElementById('bedrockHost').value.trim();
                let port = document.getElementById('bedrockPort').value.trim();
                if (!host) return null;
                if (!port) {
                    port = '19132';
                }
                return host + ':' + port;
            } else {
                const input = document.getElementById('serverInput').value.trim();
                if (!input) return null;
                return input;
            }
        }

        function parseAddress(input) {
            input = input.trim();
            if (!input) return null;
            if (input.includes(':')) {
                const parts = input.split(':');
                const host = parts[0];
                const port = parseInt(parts[1]);
                if (host && port && !isNaN(port)) {
                    return { host, port };
                }
            }
            return { host: input, port: null };
        }

        function formatPlayers(arr) {
            const chunks = [];
            for (let i = 0; i < arr.length; i += 3) {
                let group = arr.slice(i, i + 3).join(', ');
                if (i + 3 < arr.length) {
                    group += ',';
                }
                chunks.push(group);
            }
            return chunks.join('<br>');
        }

        function formatMOTD(text) {
            const words = text.split(' ');
            const chunks = [];
            for (let i = 0; i < words.length; i += 3) {
                chunks.push(words.slice(i, i + 3).join(' '));
            }
            return chunks.join('<br>');
        }

        function stopRefresh() {
            if (refreshTimer) {
                clearInterval(refreshTimer);
                refreshTimer = null;
            }
            document.getElementById('refreshIndicator').classList.remove('show');
        }

        function startRefresh(address, isBedrock) {
            stopRefresh();
            document.getElementById('refreshIndicator').classList.add('show');
            refreshTimer = setInterval(() => {
                queryServer(address, true, isBedrock);
            }, 10000);
        }

        async function queryGeo(ip) {
            try {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 5000);
                const resp = await fetch(`https://api.ip.sb/geoip/${ip}`, {
                    signal: controller.signal,
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                clearTimeout(timeout);
                if (!resp.ok) return null;
                const data = await resp.json();
                if (data.country) {
                    const country = data.country === 'China' ? '中国' : data.country;
                    const isp = data.organization || data.isp || '';
                    if (isp) {
                        return `${country} (${isp})`;
                    }
                    return `${country}`;
                }
                return null;
            } catch (e) {
                return null;
            }
        }

        function copyToClipboard(text) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    const btn = document.getElementById('copyBtn');
                    const t = translations[currentLang];
                    document.getElementById('copyLabel').textContent = t.copied;
                    btn.classList.add('copied');
                    setTimeout(() => {
                        document.getElementById('copyLabel').textContent = t.copyAddr;
                        btn.classList.remove('copied');
                    }, 2000);
                }).catch(() => {
                    fallbackCopy(text);
                });
            } else {
                fallbackCopy(text);
            }
        }

        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                const btn = document.getElementById('copyBtn');
                const t = translations[currentLang];
                document.getElementById('copyLabel').textContent = t.copied;
                btn.classList.add('copied');
                setTimeout(() => {
                    document.getElementById('copyLabel').textContent = t.copyAddr;
                    btn.classList.remove('copied');
                }, 2000);
            } catch (e) {
                alert('复制失败，请手动复制');
            }
            document.body.removeChild(textarea);
        }

        async function displayResult(address, data, isBedrock = false, ping = 0, pingNode = '') {
            renderResultCard(address, data, isBedrock);
            if (ping > 0) {
                const t = translations[currentLang];
                let pingDisplay = `${ping}ms`;
                if (pingNode) {
                    pingDisplay += ` (${pingNode})`;
                }
                document.getElementById('pingValue').textContent = pingDisplay;
            }
            startRefresh(address, isBedrock);
        }

        async function queryServer(address, silent = false, isBedrock = false) {
            const loading = document.getElementById('loadingIndicator');
            const area = document.getElementById('previewArea');
            const btn = document.getElementById('queryBtn');

            const parsed = parseAddress(address);
            if (parsed) {
                cachedIp = parsed.host;
                cachedPort = parsed.port || (isBedrock ? 19132 : 25565);
                cachedFullAddress = `${cachedIp}:${cachedPort}`;
                document.getElementById('realIpValue').textContent = cachedFullAddress;
            }

            if (!silent) {
                loading.style.display = 'block';
                area.classList.remove('show');
                btn.disabled = true;
                stopRefresh();
            }

            if (silent) {
                document.getElementById('resultDetails').innerHTML = '';
                document.getElementById('statusBadge').innerHTML = '';
                document.getElementById('resultAddress').textContent = address + ' (刷新中...)';
                loading.style.display = 'block';
            }

            let ping = 0;
            let pingNode = '';
            let data = null;
            let requestFailed = false;
            let offline = false;

            try {
                if (!parsed) throw new Error('Invalid');

                let url;
                if (isBedrock) {
                    url = `https://api.mcsrvstat.us/bedrock/3/${encodeURIComponent(parsed.host)}`;
                    if (parsed.port) {
                        url = `https://api.mcsrvstat.us/bedrock/3/${encodeURIComponent(parsed.host)}:${parsed.port}`;
                    }
                } else {
                    url = `https://api.mcsrvstat.us/3/${encodeURIComponent(parsed.host)}`;
                    if (parsed.port) {
                        url = `https://api.mcsrvstat.us/3/${encodeURIComponent(parsed.host)}:${parsed.port}`;
                    }
                }

                const pingUrl = `${CONFIG.pingApi}?url=${encodeURIComponent(parsed.host)}`;

                const startTime = performance.now();
                const [statusResp, pingResp] = await Promise.all([
                    fetch(url),
                    fetch(pingUrl)
                ]);
                const endTime = performance.now();
                ping = Math.round(endTime - startTime);
                currentPing = ping;

                data = await statusResp.json();

                if (pingResp.ok) {
                    const pingData = await pingResp.json();
                    if (pingData.code === 200 && pingData.data && pingData.data.time) {
                        const timeStr = pingData.data.time;
                        const timeNum = parseFloat(timeStr);
                        if (!isNaN(timeNum)) {
                            ping = Math.round(timeNum);
                            currentPing = ping;
                        }
                        if (pingData.data.server) {
                            pingNode = pingData.data.server;
                            currentPingNode = pingNode;
                        }
                    }
                }

                if (data.online === false) {
                    offline = true;
                }

                if (data.ip) {
                    cachedIp = data.ip;
                    cachedPort = data.port || parsed.port || (isBedrock ? 19132 : 25565);
                    cachedFullAddress = `${cachedIp}:${cachedPort}`;
                    document.getElementById('realIpValue').textContent = cachedFullAddress;
                }

            } catch (e) {
                requestFailed = true;
            }

            if (!silent) {
                loading.style.display = 'none';
                btn.disabled = false;
            }
            if (silent) {
                loading.style.display = 'none';
            }
            area.classList.add('show');

            if (!silent && !requestFailed && data && data.online === true) {
                saveHistory(address);
            }

            currentAddress = address;
            cachedIsBedrock = isBedrock;

            const t = translations[currentLang];

            if (cachedGeo === null && cachedIp) {
                const geo = await queryGeo(cachedIp);
                cachedGeo = geo || t.unknownLocation;
                document.getElementById('geoValue').textContent = cachedGeo;
            } else if (cachedGeo !== null) {
                document.getElementById('geoValue').textContent = cachedGeo;
            } else {
                document.getElementById('geoValue').textContent = t.unknownLocation;
            }

            if (ping > 0) {
                let pingDisplay = `${ping}ms`;
                if (pingNode) {
                    pingDisplay += ` (${pingNode})`;
                }
                document.getElementById('pingValue').textContent = pingDisplay;
            } else {
                document.getElementById('pingValue').textContent = '--';
            }

            if (requestFailed) {
                document.getElementById('resultAddress').textContent = address;
                document.getElementById('statusBadge').innerHTML = `<span class="status-badge status-unknown">${t.unknown}</span>`;
                document.getElementById('resultDetails').innerHTML =
                    `<div style="color:var(--text-secondary);text-align:center;padding:10px;">${t.fetchFailed}</div>`;
                startRefresh(address, isBedrock);
                cachedData = null;
                return;
            }

            if (offline || data.online === false) {
                document.getElementById('resultAddress').textContent = address;
                document.getElementById('statusBadge').innerHTML = `<span class="status-badge status-offline">${t.offline}</span>`;
                let html = '';
                html += `<div class="info-row">
                    <span class="info-label">${t.version}</span>
                    <span class="info-value" style="color:var(--offline-color);">${t.notMcServer}</span>
                </div>`;
                document.getElementById('resultDetails').innerHTML = html;
                startRefresh(address, isBedrock);
                cachedData = data;
                return;
            }

            if (data && data.online === true) {
                cachedData = data;
                await displayResult(address, data, isBedrock, ping, pingNode);
            }
        }

        document.getElementById('copyBtn').addEventListener('click', function() {
            const t = translations[currentLang];
            if (cachedFullAddress) {
                copyToClipboard(cachedFullAddress);
            } else {
                const address = document.getElementById('resultAddress').textContent;
                if (address && address !== '—') {
                    copyToClipboard(address);
                } else {
                    alert('没有可复制的地址');
                }
            }
        });

        function saveHistory(addr) {
            queryHistory = queryHistory.filter(item => item !== addr);
            queryHistory.unshift(addr);
            if (queryHistory.length > 10) queryHistory.pop();
            localStorage.setItem('mcQueryHistory', JSON.stringify(queryHistory));
            renderHistory();
        }

        function renderHistory() {
            const container = document.getElementById('historyTags');
            if (!container) return;
            if (queryHistory.length === 0) {
                container.innerHTML = '<span style="color:var(--text-link);font-size:12px;">暂无查询记录</span>';
                return;
            }
            container.innerHTML = queryHistory.map(addr =>
                `<span class="history-tag" data-address="${addr}">${addr}</span>`
            ).join('');

            container.querySelectorAll('.history-tag').forEach(tag => {
                tag.addEventListener('click', function() {
                    const addr = this.dataset.address;
                    const isBedrock = addr.includes('19132') || addr.includes('19133');
                    if (isBedrock) {
                        document.getElementById('bedrockCheck').checked = true;
                        const parts = addr.split(':');
                        document.getElementById('bedrockHost').value = parts[0];
                        document.getElementById('bedrockPort').value = parts[1] || '';
                        document.getElementById('bedrockInputs').classList.add('show');
                        document.getElementById('serverInput').style.display = 'none';
                        document.getElementById('serverInput').value = '';
                    } else {
                        document.getElementById('bedrockCheck').checked = false;
                        document.getElementById('bedrockInputs').classList.remove('show');
                        document.getElementById('serverInput').style.display = 'block';
                        document.getElementById('serverInput').value = addr;
                        document.getElementById('bedrockHost').value = '';
                        document.getElementById('bedrockPort').value = '';
                    }
                    stopRefresh();
                    const isBedrockNow = document.getElementById('bedrockCheck').checked;
                    cachedGeo = null;
                    queryServer(addr, false, isBedrockNow);
                });
            });
        }

        document.getElementById('clearHistoryBtn').addEventListener('click', function() {
            const t = translations[currentLang];
            if (confirm(t.clearConfirm)) {
                queryHistory = [];
                localStorage.removeItem('mcQueryHistory');
                renderHistory();
            }
        });

        document.getElementById('queryBtn').addEventListener('click', function() {
            const address = getAddress();
            if (!address) {
                showError(translations[currentLang].enterAddress);
                return;
            }
            stopRefresh();
            const isBedrock = document.getElementById('bedrockCheck').checked;
            cachedGeo = null;
            queryServer(address, false, isBedrock);
        });

        document.getElementById('serverInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') document.getElementById('queryBtn').click();
        });
        document.getElementById('bedrockHost').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') document.getElementById('queryBtn').click();
        });
        document.getElementById('bedrockPort').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') document.getElementById('queryBtn').click();
        });

        const savedLang = getCookie('lang');
        if (savedLang === 'zh' || savedLang === 'en') {
            document.querySelectorAll('.lang-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.lang === savedLang);
            });
            switchLanguage(savedLang);
        } else {
            switchLanguage('zh');
        }

        initTheme();
        renderHistory();

        const q = new URLSearchParams(window.location.search).get('q');
        if (q) {
            const isBedrock = q.includes('19132') || q.includes('19133');
            if (isBedrock) {
                document.getElementById('bedrockCheck').checked = true;
                const parts = q.split(':');
                document.getElementById('bedrockHost').value = parts[0];
                document.getElementById('bedrockPort').value = parts[1] || '';
                document.getElementById('bedrockInputs').classList.add('show');
                document.getElementById('serverInput').style.display = 'none';
            } else {
                document.getElementById('serverInput').value = q;
            }
            setTimeout(() => {
                const isBedrockNow = document.getElementById('bedrockCheck').checked;
                cachedGeo = null;
                queryServer(q, false, isBedrockNow);
            }, 500);
        }
    </script>
