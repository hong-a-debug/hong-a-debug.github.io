<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title id="pageTitle">红怪的个人博客</title>
    <link rel="icon" type="image/png" href="/icon/icon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #FFF5E6;
            --card-bg: #FFFFFF;
            --card-border: #F0E0D0;
            --text-primary: #2D2D2D;
            --text-secondary: #888888;
            --text-link: #AAAAAA;
            --accent: #FF8C42;
            --accent-hover: #E67A30;
            --search-bg: #FFFFFF;
            --icon-bg: #FFF0E5;
            --cookie-bg: #2D2D2D;
            --cookie-text: #FFFFFF;
        }

        body.dark {
            --bg-color: #000000;
            --card-bg: #1a1a1a;
            --card-border: #333333;
            --text-primary: #eeeeee;
            --text-secondary: #aaaaaa;
            --text-link: #888888;
            --accent: #27ae60;
            --accent-hover: #2ecc71;
            --search-bg: #2a2a2a;
            --icon-bg: #2a2a2a;
            --cookie-bg: #1a1a1a;
            --cookie-text: #eeeeee;
        }

        body {
            background-color: var(--bg-color);
            font-family: '微软雅黑', 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            position: relative;
            transition: background-color 0.3s, color 0.3s;
        }

        .top-left-buttons {
            position: fixed;
            top: 20px;
            left: 24px;
            z-index: 200;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .theme-btn {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 40px;
            padding: 8px 14px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-primary);
            font-family: inherit;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-btn:hover {
            background-color: var(--accent);
            color: white;
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        .language-selector {
            position: fixed;
            top: 20px;
            right: 24px;
            z-index: 200;
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 40px;
            padding: 6px 12px;
            display: flex;
            gap: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .lang-btn {
            background: none;
            border: none;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 30px;
            transition: all 0.2s;
            color: var(--text-secondary);
            font-family: inherit;
        }

        .lang-btn.active {
            background-color: var(--accent);
            color: white;
        }

        .lang-btn:not(.active):hover {
            background-color: var(--icon-bg);
            color: var(--accent);
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            width: 540px;
            max-width: 100%;
            padding: 0 28px 36px 28px;
            transition: background-color 0.3s, border-color 0.3s;
        }

        .top-orange-strip {
            width: calc(100% + 56px);
            margin: 0 -28px 0 -28px;
            height: 6px;
            background-color: var(--accent);
        }

        .top-white-bar {
            width: calc(100% + 56px);
            margin: 0 -28px 0 -28px;
            background-color: var(--card-bg);
            padding: 12px 28px;
            border-bottom: 1px solid var(--card-border);
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            justify-content: flex-start;
            align-items: center;
            box-sizing: border-box;
            transition: background-color 0.3s;
        }

        .top-white-bar span::before {
            content: "🐤 ";
            font-size: 15px;
        }

        .big-btn {
            background-color: var(--accent);
            color: white;
            font-size: 16px;
            font-weight: bold;
            padding: 14px 20px;
            width: 100%;
            border: none;
            cursor: pointer;
            text-align: center;
            display: inline-block;
            text-decoration: none;
            transition: all 0.2s;
            margin-top: 24px;
            margin-bottom: 12px;
            letter-spacing: 2px;
            border-radius: 4px;
        }

        .big-btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        .hint-text {
            color: var(--text-secondary);
            font-size: 11px;
            text-align: center;
            margin-bottom: 24px;
        }

        .divider {
            height: 1px;
            background-color: var(--card-border);
            margin: 20px 0;
            width: 100%;
        }

        .search-section {
            margin: 20px 0;
        }

        .search-container {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .search-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--card-border);
            border-radius: 40px;
            font-size: 14px;
            font-family: inherit;
            background-color: var(--search-bg);
            color: var(--text-primary);
            transition: all 0.2s;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(39, 174, 96, 0.2);
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        .search-btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .search-btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        .links-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 16px 0;
        }

        .link-card {
            display: flex;
            align-items: center;
            gap: 14px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 12px 16px;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.2s;
            cursor: pointer;
        }

        .link-card:hover {
            background-color: var(--icon-bg);
            border-color: var(--accent);
            transform: translateX(4px);
        }

        .link-card.hidden {
            display: none;
        }

        .link-icon {
            width: 40px;
            height: 40px;
            background: var(--icon-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--accent);
            border-radius: 8px;
            transition: background 0.3s;
        }

        .link-info {
            flex: 1;
        }

        .link-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .link-desc {
            font-size: 11px;
            color: var(--text-link);
        }

        .no-result {
            text-align: center;
            padding: 20px;
            color: var(--text-link);
            font-size: 13px;
            display: none;
        }

        .no-result.show {
            display: block;
        }

        .cookie-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1001;
        }

        .cookie-modal-content {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 28px 24px;
            width: 380px;
            max-width: 90%;
            text-align: center;
            border: 1px solid var(--card-border);
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.3);
        }

        .cookie-modal-content p {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-primary);
            margin-bottom: 24px;
        }

        .cookie-modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .cookie-modal-buttons button {
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .cookie-accept {
            background-color: var(--accent);
            color: white;
        }

        .cookie-accept:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        .cookie-decline {
            background-color: #EAEAEA;
            color: #555;
        }

        body.dark .cookie-decline {
            background-color: #333333;
            color: #aaaaaa;
        }

        .cookie-decline:hover {
            background-color: #D0D0D0;
            transform: translateY(-1px);
        }

        body.dark .cookie-decline:hover {
            background-color: #444444;
        }

        .footer-consent-section {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid var(--card-border);
            text-align: center;
            display: none;
        }

        .footer-consent-btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .footer-consent-btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        @media (max-width: 560px) {
            body {
                padding: 20px 16px;
            }
            .card {
                padding: 0 20px 28px 20px;
            }
            .top-orange-strip {
                width: calc(100% + 40px);
                margin: 0 -20px 0 -20px;
            }
            .top-white-bar {
                width: calc(100% + 40px);
                margin: 0 -20px 0 -20px;
                padding: 10px 20px;
            }
            .language-selector {
                top: 12px;
                right: 16px;
                padding: 4px 8px;
            }
            .lang-btn {
                font-size: 11px;
                padding: 2px 8px;
            }
            .top-left-buttons {
                top: 12px;
                left: 16px;
            }
            .theme-btn {
                padding: 6px 12px;
                font-size: 14px;
            }
            .search-container {
                gap: 6px;
            }
            .search-input {
                padding: 8px 12px;
                font-size: 13px;
            }
            .search-btn {
                padding: 8px 14px;
                font-size: 13px;
            }
            .cookie-modal-content {
                width: 320px;
                padding: 24px 20px;
            }
            .cookie-modal-content p {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="top-left-buttons">
        <button id="themeToggle" class="theme-btn">🌙</button>
    </div>

    <div class="language-selector">
        <button class="lang-btn active" data-lang="zh">中文</button>
        <button class="lang-btn" data-lang="en">English</button>
    </div>

    <div class="card">
        <div class="top-orange-strip"></div>
        <div class="top-white-bar">
            <span id="siteName">红怪</span>
        </div>

        <div>

        <div class="search-section">

        <div class="links-grid" id="linksGrid">

                <div class="link-icon">🎮</div>

            </a>

            <div class="link-card" id="qqBtn" style="cursor: pointer;" data-name="QQ社区" data-desc="点击复制QQ号">
                <div class="link-icon">💬</div>
                <div class="link-info">
                    <div class="link-name" id="qqName">QQ社区</div>

                </div>
            </div>
            <a href="/license.html" class="link-card" data-name="许可协议" data-desc="CC BY-NC-SA 4.0 国际许可证">
                <div class="link-icon">📜</div>
                <div class="link-info">
                    <div class="link-name" id="licenseName">许可协议</div>

                </div>
            </a>
        </div>
        <div class="no-result" id="noResult">😢 没有找到相关链接</div>

        <div class="footer-consent-section" id="footerConsentSection">
            <button id="footerConsentBtn" class="footer-consent-btn">🍪 同意 COOKIE</button>
        </div>
    </div>

    <script>
        const translations = {
            zh: {
                pageTitle: "红怪的个人博客",
                siteName: "红怪",
                bilibiliBtn: "📁 红怪的B站首页",
                hintText: "💡 点击按钮跳转B站，或使用下方链接",
                searchPlaceholder: "搜索链接...",
                searchBtn: "搜索",
                discordName: "Discord 社区",
                discordDesc: "红怪的 Discord 邀请链接",
                githubName: "GitHub 主页",
                githubDesc: "杂七杂八的东西",
                modrinthName: "红怪的Modrinth主页",
                modrinthDesc: "红怪在Modrinth的主页，主要是一些Minecraft相关的东西",
                toolName: "小鸡头像自动工具",
                toolDesc: "下载版 | 18.1M",
                onlineToolName: "小鸡头像在线工具",
                onlineToolDesc: "在线生成 | 无需下载，浏览器直接使用",
                pclName: "PCL主页",
                pclDesc: "点击弹窗复制内容",
                qqName: "QQ社区",
                qqDesc: "点击复制QQ号",
                licenseName: "许可协议",
                licenseDesc: "CC BY-NC-SA 4.0 国际许可证",
                noResult: "😢 没有找到相关链接",
                cookieMessage: "🍪 本网站使用 Cookie 保存您的语言选项。如果您不同意，我们仅保存必要的 Cookie。",
                acceptBtn: "同意",
                declineBtn: "不同意",
                footerConsentBtn: "🍪 同意 COOKIE"
            },
            en: {
                pageTitle: "Hongguai's Personal Blog",
                siteName: "Hongguai",
                bilibiliBtn: "📁 Hongguai's Bilibili",
                hintText: "💡 Click to visit Bilibili, or use links below",
                searchPlaceholder: "Search links...",
                searchBtn: "Search",
                discordName: "Discord Community",
                discordDesc: "Hongguai's Discord invite",
                githubName: "GitHub Home",
                githubDesc: "Miscellaneous stuff",
                modrinthName: "Hongguai's Modrinth Home",
                modrinthDesc: "Hongguai's Modrinth profile, mainly Minecraft related stuff",
                toolName: "Chick Avatar Tool",
                toolDesc: "Download | 18.1M",
                onlineToolName: "Chick Avatar Online Tool",
                onlineToolDesc: "Online | No download required",
                pclName: "PCL Home",
                pclDesc: "Click to copy",
                qqName: "QQ Community",
                qqDesc: "Click to copy QQ number",
                licenseName: "License",
                licenseDesc: "CC BY-NC-SA 4.0 International",
                noResult: "😢 No matching links found",
                cookieMessage: "🍪 This website uses cookies to save your language preference. If you disagree, we will only save necessary cookies.",
                acceptBtn: "Agree",
                declineBtn: "Disagree",
                footerConsentBtn: "🍪 Agree to COOKIE"
            }
        };

        let currentLang = 'zh';

        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return null;
        }

        function setCookie(name, value, days) {
            const date = new Date();
            date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
            document.cookie = name + "=" + value + "; expires=" + date.toUTCString() + "; path=/";
        }

        function deleteCookie(name) {
            document.cookie = name + "=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
        }

        function filterLinks() {
            const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
            const links = document.querySelectorAll('#linksGrid .link-card');
            let hasVisible = false;
            
            links.forEach(link => {
                const name = link.getAttribute('data-name') || '';
                const desc = link.getAttribute('data-desc') || '';
                if (keyword === '' || name.toLowerCase().includes(keyword) || desc.toLowerCase().includes(keyword)) {
                    link.classList.remove('hidden');
                    hasVisible = true;
                } else {
                    link.classList.add('hidden');
                }
            });
            
            const noResult = document.getElementById('noResult');
            if (hasVisible || keyword === '') {
                noResult.classList.remove('show');
            } else {
                noResult.classList.add('show');
            }
        }

        function switchLanguage(lang, saveToCookie = true) {
            currentLang = lang;
            const texts = translations[lang];
            
            document.title = texts.pageTitle;
            document.getElementById('siteName').textContent = texts.siteName;
            document.getElementById('bilibiliBtn').innerHTML = texts.bilibiliBtn;
            document.getElementById('hintText').textContent = texts.hintText;
            document.getElementById('searchInput').placeholder = texts.searchPlaceholder;
            document.getElementById('searchBtn').textContent = texts.searchBtn;
            document.getElementById('discordName').textContent = texts.discordName;
            document.getElementById('discordDesc').textContent = texts.discordDesc;
            document.getElementById('githubName').textContent = texts.githubName;
            document.getElementById('githubDesc').textContent = texts.githubDesc;
            // Modrinth 元素更新
            const modrinthNameEl = document.getElementById('modrinthName');
            const modrinthDescEl = document.getElementById('modrinthDesc');
            if (modrinthNameEl) modrinthNameEl.textContent = texts.modrinthName;
            if (modrinthDescEl) modrinthDescEl.textContent = texts.modrinthDesc;
            // 同时更新对应的data属性，用于搜索
            const modrinthLink = document.querySelector('a.link-card[href="https://modrinth.com/user/HongGuai"]');
            if (modrinthLink) {
                modrinthLink.setAttribute('data-name', texts.modrinthName);
                modrinthLink.setAttribute('data-desc', texts.modrinthDesc);
            }
            
            document.getElementById('toolName').textContent = texts.toolName;
            document.getElementById('toolDesc').textContent = texts.toolDesc;
            document.getElementById('onlineToolName').textContent = texts.onlineToolName;
            document.getElementById('onlineToolDesc').textContent = texts.onlineToolDesc;
            document.getElementById('pclName').textContent = texts.pclName;
            document.getElementById('pclDesc').textContent = texts.pclDesc;
            document.getElementById('qqName').textContent = texts.qqName;
            document.getElementById('qqDesc').textContent = texts.qqDesc;
            document.getElementById('licenseName').textContent = texts.licenseName;
            document.getElementById('licenseDesc').textContent = texts.licenseDesc;
            document.getElementById('noResult').textContent = texts.noResult;
            
            const cookieTextEl = document.getElementById('cookieText');
            if (cookieTextEl) cookieTextEl.textContent = texts.cookieMessage;
            
            const acceptBtn = document.getElementById('acceptCookie');
            if (acceptBtn) acceptBtn.textContent = texts.acceptBtn;
            
            const declineBtn = document.getElementById('declineCookie');
            if (declineBtn) declineBtn.textContent = texts.declineBtn;
            
            const footerConsentBtn = document.getElementById('footerConsentBtn');
            if (footerConsentBtn) footerConsentBtn.textContent = texts.footerConsentBtn;
            
            filterLinks();
            
            if (saveToCookie && getCookie('cookie_consent') === 'accepted') {
                setCookie('lang', lang, 30);
            }
        }

        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const lang = btn.getAttribute('data-lang');
                if (!lang) return;
                document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                switchLanguage(lang, true);
            });
        });

        document.getElementById('searchBtn').addEventListener('click', filterLinks);
        document.getElementById('searchInput').addEventListener('input', function() {
            if (this.value.trim() === '') {
                filterLinks();
            }
        });
        document.getElementById('searchInput').addEventListener('keyup', (e) => {
            if (e.key === 'Enter') {
                filterLinks();
            }
        });

        function initTheme() {
            const savedTheme = getCookie('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark');
                updateThemeButton('dark');
            } else {
                document.body.classList.remove('dark');
                updateThemeButton('light');
            }
        }

        function updateThemeButton(theme) {
            const btn = document.getElementById('themeToggle');
            if (!btn) return;
            btn.innerHTML = theme === 'dark' ? '☀️' : '🌙';
        }

        function toggleTheme() {
            if (document.body.classList.contains('dark')) {
                document.body.classList.remove('dark');
                setCookie('theme', 'light', 30);
                updateThemeButton('light');
            } else {
                document.body.classList.add('dark');
                setCookie('theme', 'dark', 30);
                updateThemeButton('dark');
            }
        }

        function downloadFile() {
            const link = document.createElement('a');
            link.href = 'https://hongguai.j3.ink/%E5%90%AF%E5%8A%A8.exe';
            link.download = '启动.exe';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        document.getElementById('themeToggle')?.addEventListener('click', toggleTheme);
        document.getElementById('downloadToolBtn').addEventListener('click', function(e) {
            e.preventDefault();
            downloadFile();
        });
        document.getElementById('pclHomeBtn').addEventListener('click', createPCLModal);
        document.getElementById('qqBtn').addEventListener('click', createQQModal);

            copyBtn.style.borderRadius = '40px';
            copyBtn.style.fontSize = '14px';
            copyBtn.style.cursor = 'pointer';
            copyBtn.style.marginRight = '12px';
            
            const closeBtn = document.createElement('button');
            closeBtn.innerText = currentLang === 'zh' ? '关闭' : 'Close';
            closeBtn.style.backgroundColor = '#EAEAEA';
            closeBtn.style.color = '#555';
            closeBtn.style.border = 'none';
            closeBtn.style.padding = '8px 20px';
            closeBtn.style.borderRadius = '40px';
            closeBtn.style.fontSize = '14px';
            closeBtn.style.cursor = 'pointer';
            
            const btnWrapper = document.createElement('div');
            btnWrapper.appendChild(copyBtn);
            btnWrapper.appendChild(closeBtn);
            
            modalContent.appendChild(title);
            modalContent.appendChild(tipText);
            modalContent.appendChild(textContainer);
            modalContent.appendChild(btnWrapper);
            modalOverlay.appendChild(modalContent);
            document.body.appendChild(modalOverlay);
            
            copyBtn.addEventListener('click', () => {
                navigator.clipboard.writeText(textToCopy).then(() => {
                    copyBtn.innerText = currentLang === 'zh' ? '✅ 已复制' : '✅ Copied';
                    setTimeout(() => {
                        copyBtn.innerText = currentLang === 'zh' ? '复制文本' : 'Copy';
                    }, 1500);
                }).catch(() => {
                    alert(currentLang === 'zh' ? '复制失败，请手动选择文本' : 'Copy failed, please select manually');
                });

            const closeModal = () => {
                document.body.removeChild(modalOverlay);
                document.body.style.overflow = '';
            };
            closeBtn.addEventListener('click', closeModal);
            modalOverlay.addEventListener('click', (e) => {
                if (e.target === modalOverlay) closeModal();
            });
        }

        function showCookieModal() {
            const modal = document.createElement('div');
            modal.className = 'cookie-modal';
            const texts = translations[currentLang];
            modal.innerHTML = `
                <div class="cookie-modal-content">
                    <p>${texts.cookieMessage}</p>
                    <div class="cookie-modal-buttons">
                        <button id="cookieAccept" class="cookie-accept">${texts.acceptBtn}</button>
                        <button id="cookieDecline" class="cookie-decline">${texts.declineBtn}</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            document.body.style.overflow = 'hidden';

            document.getElementById('cookieAccept').addEventListener('click', () => {
                setCookie('cookie_consent', 'accepted', 30);
                setCookie('lang', currentLang, 30);
                document.body.removeChild(modal);
                document.body.style.overflow = '';
                document.getElementById('footerConsentSection').style.display = 'none';
            });

            document.getElementById('cookieDecline').addEventListener('click', () => {
                setCookie('cookie_consent', 'declined', 30);
                deleteCookie('lang');
                document.body.removeChild(modal);
                document.body.style.overflow = '';
                document.getElementById('footerConsentSection').style.display = 'block';
            });
        }

        function initCookieConsent() {
            const consent = getCookie('cookie_consent');
            if (!consent) {
                showCookieModal();
            } else if (consent === 'declined') {
                document.getElementById('footerConsentSection').style.display = 'block';
                deleteCookie('lang');
            } else if (consent === 'accepted') {
                const savedLang = getCookie('lang');
                if (savedLang && (savedLang === 'zh' || savedLang === 'en')) {
                    document.querySelectorAll('.lang-btn').forEach(btn => {
                        const lang = btn.getAttribute('data-lang');
                        if (lang === savedLang) {
                            btn.classList.add('active');
                        } else {
                            btn.classList.remove('active');
                        }
                    });
                    switchLanguage(savedLang, false);
                }
            }
        }

        document.getElementById('footerConsentBtn').addEventListener('click', () => {
            setCookie('cookie_consent', 'accepted', 30);
            setCookie('lang', currentLang, 30);
            document.getElementById('footerConsentSection').style.display = 'none';
        });

        initTheme();
        initCookieConsent();
    </script>
