<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>红怪的个人博客</title>
    <link rel="icon" type="image/png" href="/icon/icon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #FFF5E6;
            font-family: '微软雅黑', 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            position: relative;
        }

        .language-selector {
            position: fixed;
            top: 20px;
            right: 24px;
            z-index: 200;
            background-color: #FFFFFF;
            border: 1px solid #F0E0D0;
            border-radius: 40px;
            padding: 6px 12px;
            display: flex;
            gap: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .lang-btn {
            background: none;
            border: none;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 30px;
            transition: all 0.2s;
            color: #888888;
            font-family: inherit;
        }

        .lang-btn.active {
            background-color: #FF8C42;
            color: white;
        }

        .lang-btn:not(.active):hover {
            background-color: #FFF0E5;
            color: #E67A30;
        }

        .card {
            background-color: #FFFFFF;
            border: 1px solid #F0E0D0;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            width: 540px;
            max-width: 100%;
            padding: 0 28px 36px 28px;
        }

        .top-orange-strip {
            width: calc(100% + 56px);
            margin: 0 -28px 0 -28px;
            height: 6px;
            background-color: #FF8C42;
        }

        .top-white-bar {
            width: calc(100% + 56px);
            margin: 0 -28px 0 -28px;
            background-color: #FFFFFF;
            padding: 12px 28px;
            border-bottom: 1px solid #F0E0D0;
            font-size: 16px;
            font-weight: 600;
            color: #2D2D2D;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            box-sizing: border-box;
        }

        .top-white-bar span::before {
            content: "🐤 ";
            font-size: 15px;
        }

        .big-btn {
            background-color: #FF8C42;
            color: white;
            font-size: 16px;
            font-weight: bold;
            padding: 14px 20px;
            width: 100%;
            border: none;
            cursor: pointer;
            text-align: center;
            display: inline-block;
            text-decoration: none;
            transition: all 0.2s;
            margin-top: 24px;
            margin-bottom: 12px;
            letter-spacing: 2px;
            border-radius: 4px;
        }

        .big-btn:hover {
            background-color: #E67A30;
            transform: translateY(-1px);
        }

        .hint-text {
            color: #888888;
            font-size: 11px;
            text-align: center;
            margin-bottom: 24px;
        }

        .divider {
            height: 1px;
            background-color: #F0E0D0;
            margin: 20px 0;
            width: 100%;
        }

        .search-section {
            margin: 20px 0;
        }

        .search-container {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .search-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #F0E0D0;
            border-radius: 40px;
            font-size: 14px;
            font-family: inherit;
            background-color: #FFFFFF;
            transition: all 0.2s;
            outline: none;
        }

        .search-input:focus {
            border-color: #FF8C42;
            box-shadow: 0 0 0 2px rgba(255, 140, 66, 0.2);
        }

        .search-btn {
            background-color: #FF8C42;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .search-btn:hover {
            background-color: #E67A30;
            transform: translateY(-1px);
        }

        .links-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 16px 0;
        }

        .link-card {
            display: flex;
            align-items: center;
            gap: 14px;
            background: #FFFFFF;
            border: 1px solid #F0E0D0;
            padding: 12px 16px;
            text-decoration: none;
            color: #2D2D2D;
            transition: all 0.2s;
            cursor: pointer;
        }

        .link-card:hover {
            background-color: #FFF5E6;
            border-color: #FF8C42;
            transform: translateX(4px);
        }

        .link-card.hidden {
            display: none;
        }

        .link-icon {
            width: 40px;
            height: 40px;
            background: #FFF0E5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #FF8C42;
            border-radius: 8px;
        }

        .link-info {
            flex: 1;
        }

        .link-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .link-desc {
            font-size: 11px;
            color: #AAAAAA;
            word-break: break-all;
        }

        .no-result {
            text-align: center;
            padding: 20px;
            color: #AAAAAA;
            font-size: 13px;
            display: none;
        }

        .no-result.show {
            display: block;
        }

        @media (max-width: 560px) {
            body {
                padding: 20px 16px;
            }
            .card {
                padding: 0 20px 28px 20px;
            }
            .top-orange-strip {
                width: calc(100% + 40px);
                margin: 0 -20px 0 -20px;
            }
            .top-white-bar {
                width: calc(100% + 40px);
                margin: 0 -20px 0 -20px;
                padding: 10px 20px;
            }
            .language-selector {
                top: 12px;
                right: 16px;
                padding: 4px 8px;
            }
            .lang-btn {
                font-size: 11px;
                padding: 2px 8px;
            }
            .search-container {
                gap: 6px;
            }
            .search-input {
                padding: 8px 12px;
                font-size: 13px;
            }
            .search-btn {
                padding: 8px 14px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="language-selector">
        <button class="lang-btn active" data-lang="zh">中文</button>
        <button class="lang-btn" data-lang="en">English</button>
    </div>

    <div class="card">
        <div class="top-orange-strip"></div>
        <div class="top-white-bar">
            <span>红怪</span>
        </div>

        <div>
            <a href="https://space.bilibili.com/394466602" target="_blank" class="big-btn" data-key="bilibiliBtn">📁 红怪的B站首页</a>
            <div class="hint-text" data-key="hintText">💡 点击按钮跳转B站，或使用下方链接</div>
        </div>

        <div class="divider"></div>

        <div class="search-section">
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="搜索链接..." data-key="searchPlaceholder">
                <button id="searchBtn" class="search-btn" data-key="searchBtn">搜索</button>
            </div>
        </div>

        <div class="links-grid" id="linksGrid">
            <a href="https://discord.gg/nB2w3NQhkE" target="_blank" class="link-card" data-name="Discord 社区" data-desc="红怪的 Discord 邀请链接">
                <div class="link-icon">💬</div>
                <div class="link-info">
                    <div class="link-name" data-key="discordName">Discord 社区</div>
                    <div class="link-desc" data-key="discordDesc">红怪的 Discord 邀请链接</div>
                </div>
            </a>
            <a href="https://github.com/hong-a-debug" target="_blank" class="link-card" data-name="GitHub 主页" data-desc="杂七杂八的东西">
                <div class="link-icon">🐙</div>
                <div class="link-info">
                    <div class="link-name" data-key="githubName">GitHub 主页</div>
                    <div class="link-desc" data-key="githubDesc">杂七杂八的东西</div>
                </div>
            </a>
            <a href="https://wwbkg.lanzouu.com/iu9qA3qmj4rc" target="_blank" class="link-card" data-name="小鸡头像自动工具" data-desc="密码: discord社区、QQ | 蓝奏云下载 18.3M">
                <div class="link-icon">🐤</div>
                <div class="link-info">
                    <div class="link-name" data-key="toolName">小鸡头像自动工具</div>
                    <div class="link-desc" data-key="toolDesc">密码: discord社区、QQ | 蓝奏云下载 18.3M</div>
                </div>
            </a>
            <div class="link-card" id="pclHomeBtn" style="cursor: pointer;" data-name="PCL主页" data-desc="点击弹窗复制内容">
                <div class="link-icon">🚀</div>
                <div class="link-info">
                    <div class="link-name" data-key="pclName">PCL主页</div>
                    <div class="link-desc" data-key="pclDesc">点击弹窗复制内容</div>
                </div>
            </div>
            <div class="link-card" id="qqBtn" style="cursor: pointer;" data-name="QQ社区" data-desc="点击复制QQ号">
                <div class="link-icon">💬</div>
                <div class="link-info">
                    <div class="link-name" data-key="qqName">QQ社区</div>
                    <div class="link-desc" data-key="qqDesc">点击复制QQ号</div>
                </div>
            </div>
            <a href="/GameList.html" class="link-card" data-name="游戏库" data-desc="这是给同学们看的，无关的人请不要看">
                <div class="link-icon">🎮</div>
                <div class="link-info">
                    <div class="link-name" data-key="gameLibraryName">游戏库</div>
                    <div class="link-desc" data-key="gameLibraryDesc">这是给同学们看的，无关的人请不要看</div>
                </div>
            </a>
        </div>
        <div class="no-result" id="noResult" data-key="noResult">😢 没有找到相关链接</div>
    </div>

    <script>
        const translations = {
            zh: {
                bilibiliBtn: "📁 红怪的B站首页",
                hintText: "💡 点击按钮跳转B站，或使用下方链接",
                searchPlaceholder: "搜索链接...",
                searchBtn: "搜索",
                discordName: "Discord 社区",
                discordDesc: "红怪的 Discord 邀请链接",
                githubName: "GitHub 主页",
                githubDesc: "杂七杂八的东西",
                toolName: "小鸡头像自动工具",
                toolDesc: "密码: discord社区、QQ | 蓝奏云下载 18.3M",
                pclName: "PCL主页",
                pclDesc: "点击弹窗复制内容",
                qqName: "QQ社区",
                qqDesc: "点击复制QQ号",
                gameLibraryName: "游戏库",
                gameLibraryDesc: "这是给同学们看的，无关的人请不要看",
                noResult: "😢 没有找到相关链接"
            },
            en: {
                bilibiliBtn: "📁 Hongguai's Bilibili",
                hintText: "💡 Click to visit Bilibili, or use links below",
                searchPlaceholder: "Search links...",
                searchBtn: "Search",
                discordName: "Discord Community",
                discordDesc: "Hongguai's Discord invite",
                githubName: "GitHub Home",
                githubDesc: "Miscellaneous stuff",
                toolName: "Chick Avatar Tool",
                toolDesc: "Password: discord community, QQ | Lanzou 18.3M",
                pclName: "PCL Home",
                pclDesc: "Click to copy",
                qqName: "QQ Community",
                qqDesc: "Click to copy QQ number",
                gameLibraryName: "Game Library",
                gameLibraryDesc: "This is for classmates only, please do not watch if you are not",
                noResult: "😢 No matching links found"
            }
        };

        let currentLang = 'zh';

        function switchLanguage(lang) {
            currentLang = lang;
            const texts = translations[lang];
            
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if (texts[key]) {
                    if (el.tagName === 'A' && el.classList.contains('big-btn')) {
                        el.innerHTML = texts[key];
                    } else if (el.tagName === 'INPUT') {
                        el.placeholder = texts[key];
                    } else if (el.tagName === 'BUTTON' && el.id === 'searchBtn') {
                        el.textContent = texts[key];
                    } else {
                        el.textContent = texts[key];
                    }
                }
            });
            
            filterLinks();
        }

        function filterLinks() {
            const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
            const links = document.querySelectorAll('#linksGrid .link-card');
            let hasVisible = false;
            
            links.forEach(link => {
                const name = link.getAttribute('data-name') || '';
                const desc = link.getAttribute('data-desc') || '';
                if (keyword === '' || name.toLowerCase().includes(keyword) || desc.toLowerCase().includes(keyword)) {
                    link.classList.remove('hidden');
                    hasVisible = true;
                } else {
                    link.classList.add('hidden');
                }
            });
            
            const noResult = document.getElementById('noResult');
            if (hasVisible || keyword === '') {
                noResult.classList.remove('show');
            } else {
                noResult.classList.add('show');
            }
        }

        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const lang = btn.getAttribute('data-lang');
                if (!lang) return;
                document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                switchLanguage(lang);
            });
        });

        document.getElementById('searchBtn').addEventListener('click', filterLinks);
        document.getElementById('searchInput').addEventListener('input', function() {
            if (this.value.trim() === '') {
                filterLinks();
            }
        });
        document.getElementById('searchInput').addEventListener('keyup', (e) => {
            if (e.key === 'Enter') {
                filterLinks();
            }
        });

        function createPCLModal() {
            const textToCopy = 'https://raw.githubusercontent.com/hong-a-debug/w/main/Custom.xaml';
            const modalOverlay = document.createElement('div');
            modalOverlay.style.position = 'fixed';
            modalOverlay.style.top = '0';
            modalOverlay.style.left = '0';
            modalOverlay.style.width = '100%';
            modalOverlay.style.height = '100%';
            modalOverlay.style.backgroundColor = 'rgba(0,0,0,0.5)';
            modalOverlay.style.display = 'flex';
            modalOverlay.style.justifyContent = 'center';
            modalOverlay.style.alignItems = 'center';
            modalOverlay.style.zIndex = '1000';
            
            const modalContent = document.createElement('div');
            modalContent.style.backgroundColor = '#fff';
            modalContent.style.padding = '24px';
            modalContent.style.borderRadius = '16px';
            modalContent.style.width = '320px';
            modalContent.style.maxWidth = '90%';
            modalContent.style.boxShadow = '0 20px 35px -12px rgba(0,0,0,0.3)';
            modalContent.style.border = '1px solid #F0E0D0';
            modalContent.style.textAlign = 'center';
            
            const title = document.createElement('h3');
            title.innerText = currentLang === 'zh' ? '📋 复制内容' : '📋 Copy Text';
            title.style.marginBottom = '16px';
            title.style.fontSize = '18px';
            title.style.color = '#2D2D2D';
            
            const tipText = document.createElement('div');
            tipText.innerText = currentLang === 'zh' ? '复制到设置→个性化→主页→联网更新→下载地址' : 'Copy to Settings → Personalization → Home → Online Update → Download URL';
            tipText.style.backgroundColor = '#FFF0E5';
            tipText.style.padding = '8px';
            tipText.style.borderRadius = '8px';
            tipText.style.marginBottom = '16px';
            tipText.style.fontSize = '12px';
            tipText.style.color = '#E67A30';
            tipText.style.textAlign = 'center';
            
            const textContainer = document.createElement('div');
            textContainer.style.backgroundColor = '#FFF5E6';
            textContainer.style.padding = '12px';
            textContainer.style.borderRadius = '8px';
            textContainer.style.marginBottom = '20px';
            textContainer.style.wordBreak = 'break-all';
            textContainer.style.fontSize = '12px';
            textContainer.style.fontFamily = 'monospace';
            textContainer.style.color = '#E67A30';
            textContainer.innerText = textToCopy;
            
            const copyBtn = document.createElement('button');
            copyBtn.innerText = currentLang === 'zh' ? '复制文本' : 'Copy';
            copyBtn.style.backgroundColor = '#FF8C42';
            copyBtn.style.color = 'white';
            copyBtn.style.border = 'none';
            copyBtn.style.padding = '8px 20px';
            copyBtn.style.borderRadius = '40px';
            copyBtn.style.fontSize = '14px';
            copyBtn.style.cursor = 'pointer';
            copyBtn.style.marginRight = '12px';
            
            const closeBtn = document.createElement('button');
            closeBtn.innerText = currentLang === 'zh' ? '关闭' : 'Close';
            closeBtn.style.backgroundColor = '#EAEAEA';
            closeBtn.style.color = '#555';
            closeBtn.style.border = 'none';
            closeBtn.style.padding = '8px 20px';
            closeBtn.style.borderRadius = '40px';
            closeBtn.style.fontSize = '14px';
            closeBtn.style.cursor = 'pointer';
            
            const btnWrapper = document.createElement('div');
            btnWrapper.appendChild(copyBtn);
            btnWrapper.appendChild(closeBtn);
            
            modalContent.appendChild(title);
            modalContent.appendChild(tipText);
            modalContent.appendChild(textContainer);
            modalContent.appendChild(btnWrapper);
            modalOverlay.appendChild(modalContent);
            document.body.appendChild(modalOverlay);
            
            copyBtn.addEventListener('click', () => {
                navigator.clipboard.writeText(textToCopy).then(() => {
                    copyBtn.innerText = currentLang === 'zh' ? '✅ 已复制' : '✅ Copied';
                    setTimeout(() => {
                        copyBtn.innerText = currentLang === 'zh' ? '复制文本' : 'Copy';
                    }, 1500);
                }).catch(() => {
                    alert(currentLang === 'zh' ? '复制失败，请手动选择文本' : 'Copy failed, please select manually');
                });
            });
            
            const closeModal = () => {
                document.body.removeChild(modalOverlay);
            };
            closeBtn.addEventListener('click', closeModal);
            modalOverlay.addEventListener('click', (e) => {
                if (e.target === modalOverlay) closeModal();
            });
        }

        function createQQModal() {
            const textToCopy = '301595234';
            const modalOverlay = document.createElement('div');
            modalOverlay.style.position = 'fixed';
            modalOverlay.style.top = '0';
            modalOverlay.style.left = '0';
            modalOverlay.style.width = '100%';
            modalOverlay.style.height = '100%';
            modalOverlay.style.backgroundColor = 'rgba(0,0,0,0.5)';
            modalOverlay.style.display = 'flex';
            modalOverlay.style.justifyContent = 'center';
            modalOverlay.style.alignItems = 'center';
            modalOverlay.style.zIndex = '1000';
            
            const modalContent = document.createElement('div');
            modalContent.style.backgroundColor = '#fff';
            modalContent.style.padding = '24px';
            modalContent.style.borderRadius = '16px';
            modalContent.style.width = '320px';
            modalContent.style.maxWidth = '90%';
            modalContent.style.boxShadow = '0 20px 35px -12px rgba(0,0,0,0.3)';
            modalContent.style.border = '1px solid #F0E0D0';
            modalContent.style.textAlign = 'center';
            
            const title = document.createElement('h3');
            title.innerText = currentLang === 'zh' ? '📋 QQ社区' : '📋 QQ Community';
            title.style.marginBottom = '16px';
            title.style.fontSize = '18px';
            title.style.color = '#2D2D2D';
            
            const textContainer = document.createElement('div');
            textContainer.style.backgroundColor = '#FFF5E6';
            textContainer.style.padding = '12px';
            textContainer.style.borderRadius = '8px';
            textContainer.style.marginBottom = '20px';
            textContainer.style.wordBreak = 'break-all';
            textContainer.style.fontSize = '14px';
            textContainer.style.fontFamily = 'monospace';
            textContainer.style.color = '#E67A30';
            textContainer.innerText = textToCopy;
            
            const copyBtn = document.createElement('button');
            copyBtn.innerText = currentLang === 'zh' ? '复制文本' : 'Copy';
            copyBtn.style.backgroundColor = '#FF8C42';
            copyBtn.style.color = 'white';
            copyBtn.style.border = 'none';
            copyBtn.style.padding = '8px 20px';
            copyBtn.style.borderRadius = '40px';
            copyBtn.style.fontSize = '14px';
            copyBtn.style.cursor = 'pointer';
            copyBtn.style.marginRight = '12px';
            
            const closeBtn = document.createElement('button');
            closeBtn.innerText = currentLang === 'zh' ? '关闭' : 'Close';
            closeBtn.style.backgroundColor = '#EAEAEA';
            closeBtn.style.color = '#555';
            closeBtn.style.border = 'none';
            closeBtn.style.padding = '8px 20px';
            closeBtn.style.borderRadius = '40px';
            closeBtn.style.fontSize = '14px';
            closeBtn.style.cursor = 'pointer';
            
            const btnWrapper = document.createElement('div');
            btnWrapper.appendChild(copyBtn);
            btnWrapper.appendChild(closeBtn);
            
            modalContent.appendChild(title);
            modalContent.appendChild(textContainer);
            modalContent.appendChild(btnWrapper);
            modalOverlay.appendChild(modalContent);
            document.body.appendChild(modalOverlay);
            
            copyBtn.addEventListener('click', () => {
                navigator.clipboard.writeText(textToCopy).then(() => {
                    copyBtn.innerText = currentLang === 'zh' ? '✅ 已复制' : '✅ Copied';
                    setTimeout(() => {
                        copyBtn.innerText = currentLang === 'zh' ? '复制文本' : 'Copy';
                    }, 1500);
                }).catch(() => {
                    alert(currentLang === 'zh' ? '复制失败，请手动选择文本' : 'Copy failed, please select manually');
                });
            });
            
            const closeModal = () => {
                document.body.removeChild(modalOverlay);
            };
            closeBtn.addEventListener('click', closeModal);
            modalOverlay.addEventListener('click', (e) => {
                if (e.target === modalOverlay) closeModal();
            });
        }

        document.getElementById('pclHomeBtn').addEventListener('click', createPCLModal);
        document.getElementById('qqBtn').addEventListener('click', createQQModal);
    </script>
</body>
</html>
