<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>红怪的游戏库</title>
    <link rel="icon" type="image/png" href="/icon/icon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #FFF5E6;
            font-family: '微软雅黑', 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            position: relative;
        }

        .language-selector {
            position: fixed;
            top: 20px;
            right: 24px;
            z-index: 200;
            background-color: #FFFFFF;
            border: 1px solid #F0E0D0;
            border-radius: 40px;
            padding: 6px 12px;
            display: flex;
            gap: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .lang-btn {
            background: none;
            border: none;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 30px;
            transition: all 0.2s;
            color: #888888;
            font-family: inherit;
        }

        .lang-btn.active {
            background-color: #FF8C42;
            color: white;
        }

        .lang-btn:not(.active):hover {
            background-color: #FFF0E5;
            color: #E67A30;
        }

        .card {
            background-color: #FFFFFF;
            border: 1px solid #F0E0D0;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            width: 600px;
            max-width: 100%;
            padding: 0 28px 36px 28px;
        }

        .top-orange-strip {
            width: calc(100% + 56px);
            margin: 0 -28px 0 -28px;
            height: 6px;
            background-color: #FF8C42;
        }

        .top-white-bar {
            width: calc(100% + 56px);
            margin: 0 -28px 0 -28px;
            background-color: #FFFFFF;
            padding: 12px 28px;
            border-bottom: 1px solid #F0E0D0;
            font-size: 16px;
            font-weight: 600;
            color: #2D2D2D;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            box-sizing: border-box;
        }

        .search-section {
            margin: 20px 0;
        }

        .search-container {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .search-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #F0E0D0;
            border-radius: 40px;
            font-size: 14px;
            font-family: inherit;
            background-color: #FFFFFF;
            transition: all 0.2s;
            outline: none;
        }

        .search-input:focus {
            border-color: #FF8C42;
            box-shadow: 0 0 0 2px rgba(255, 140, 66, 0.2);
        }

        .search-btn {
            background-color: #FF8C42;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .search-btn:hover {
            background-color: #E67A30;
            transform: translateY(-1px);
        }

        .games-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 16px 0;
        }

        .game-card {
            display: block;
            background: #FFFFFF;
            border: 1px solid #F0E0D0;
            padding: 14px 18px;
            text-decoration: none;
            color: #2D2D2D;
            transition: all 0.2s;
            cursor: pointer;
        }

        .game-card:hover {
            background-color: #FFF5E6;
            border-color: #FF8C42;
            transform: translateX(4px);
        }

        .game-card.hidden {
            display: none;
        }

        .game-name {
            font-weight: 700;
            font-size: 15px;
            margin-bottom: 6px;
        }

        .game-desc {
            font-size: 12px;
            color: #888888;
        }

        .no-result {
            text-align: center;
            padding: 30px;
            color: #AAAAAA;
            font-size: 13px;
            display: none;
        }

        .no-result.show {
            display: block;
        }

        .divider {
            height: 1px;
            background-color: #F0E0D0;
            margin: 24px 0 20px 0;
            width: 100%;
        }

        .contact-btn {
            display: block;
            background-color: #FF8C42;
            color: white;
            font-size: 16px;
            font-weight: bold;
            padding: 12px 20px;
            width: 100%;
            border: none;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            border-radius: 40px;
            transition: all 0.2s;
            margin-bottom: 10px;
        }

        .contact-btn:hover {
            background-color: #E67A30;
            transform: translateY(-1px);
        }

        .contact-icon {
            width: 20px;
            height: 20px;
            vertical-align: middle;
            margin-right: 8px;
        }

        @media (max-width: 560px) {
            body {
                padding: 20px 16px;
            }
            .card {
                padding: 0 20px 28px 20px;
            }
            .top-orange-strip {
                width: calc(100% + 40px);
                margin: 0 -20px 0 -20px;
            }
            .top-white-bar {
                width: calc(100% + 40px);
                margin: 0 -20px 0 -20px;
                padding: 10px 20px;
            }
            .language-selector {
                top: 12px;
                right: 16px;
                padding: 4px 8px;
            }
            .lang-btn {
                font-size: 11px;
                padding: 2px 8px;
            }
            .search-container {
                gap: 6px;
            }
            .search-input {
                padding: 8px 12px;
                font-size: 13px;
            }
            .search-btn {
                padding: 8px 14px;
                font-size: 13px;
            }
            .game-name {
                font-size: 14px;
            }
            .game-desc {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="language-selector">
        <button class="lang-btn" data-lang="zh">中文</button>
        <button class="lang-btn" data-lang="en">English</button>
    </div>

    <div class="card">
        <div class="top-orange-strip"></div>
        <div class="top-white-bar">
            <span data-key="title">红怪的游戏库</span>
        </div>

        <div class="search-section">
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="搜索游戏..." data-key="searchPlaceholder">
                <button id="searchBtn" class="search-btn" data-key="searchBtn">搜索</button>
            </div>
        </div>

        <div class="games-grid" id="gamesGrid"></div>
        <div class="no-result" id="noResult" data-key="noResult">😢 没有找到相关游戏</div>

        <div class="divider"></div>

        <a href="https://hong-a-debug.github.io/" target="_blank" class="contact-btn" id="contactBtn">
            <img src="https://hong-a-debug.github.io/icon/icon.png" alt="icon" class="contact-icon" onerror="this.style.display='none'"> 个人博客
        </a>
    </div>

    <script>
        const gamesData = {
            zh: {
                games: [
                    { name: "火车站", desc: "最开始的游戏", url: "https://hong-a-debug.github.io/Games/List/01.html" },
                    { name: "FRS", desc: "最火的游戏", url: "https://hong-a-debug.github.io/Games/List/02.html" },
                    { name: "Cities Craft", desc: "这玩意儿是有电脑版的", url: "https://hong-a-debug.github.io/Games/List/03.html" }
                ]
            },
            en: {
                games: [
                    { name: "Train Station", desc: "The first game", url: "https://hong-a-debug.github.io/Games/List/01.html" },
                    { name: "FRS", desc: "The hottest game", url: "https://hong-a-debug.github.io/Games/List/02.html" },
                    { name: "Cities Craft", desc: "This one has a PC version", url: "https://hong-a-debug.github.io/Games/List/03.html" }
                ]
            }
        };

        const translations = {
            zh: {
                title: "红怪的游戏库",
                searchPlaceholder: "搜索游戏...",
                searchBtn: "搜索",
                noResult: "😢 没有找到相关游戏"
            },
            en: {
                title: "Hongguai's Game Library",
                searchPlaceholder: "Search games...",
                searchBtn: "Search",
                noResult: "😢 No games found"
            }
        };

        let currentLang = 'zh';
        let allGameCards = [];

        // Cookie 工具函数
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return null;
        }

        function setCookie(name, value, days) {
            const date = new Date();
            date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
            document.cookie = name + "=" + value + "; expires=" + date.toUTCString() + "; path=/";
        }

        function renderGames() {
            const data = gamesData[currentLang];
            const container = document.getElementById('gamesGrid');
            
            function createGameCard(game) {
                const card = document.createElement('a');
                card.className = 'game-card';
                card.href = game.url;
                card.target = '_blank';
                card.setAttribute('data-name', game.name);
                card.setAttribute('data-desc', game.desc);
                
                card.innerHTML = `
                    <div class="game-name">${game.name}</div>
                    <div class="game-desc">${game.desc}</div>
                `;
                return card;
            }
            
            container.innerHTML = '';
            const cards = data.games.map(g => createGameCard(g));
            cards.forEach(c => container.appendChild(c));
            allGameCards = cards;
        }

        function switchLanguage(lang) {
            currentLang = lang;
            const texts = translations[lang];
            
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if (texts[key]) {
                    if (el.tagName === 'INPUT') {
                        el.placeholder = texts[key];
                    } else {
                        el.textContent = texts[key];
                    }
                }
            });
            
            renderGames();
            filterGames();
            
            // 保存语言偏好到 Cookie
            setCookie('lang', lang, 30);
        }

        function filterGames() {
            const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
            let hasVisible = false;
            
            allGameCards.forEach(card => {
                const name = card.getAttribute('data-name') || '';
                const desc = card.getAttribute('data-desc') || '';
                if (keyword === '' || name.toLowerCase().includes(keyword) || desc.toLowerCase().includes(keyword)) {
                    card.classList.remove('hidden');
                    hasVisible = true;
                } else {
                    card.classList.add('hidden');
                }
            });
            
            const noResult = document.getElementById('noResult');
            if (hasVisible || keyword === '') {
                noResult.classList.remove('show');
            } else {
                noResult.classList.add('show');
            }
        }

        // 语言切换事件
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const lang = btn.getAttribute('data-lang');
                if (!lang) return;
                document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                switchLanguage(lang);
            });
        });

        document.getElementById('searchBtn').addEventListener('click', filterGames);
        document.getElementById('searchInput').addEventListener('input', function() {
            if (this.value.trim() === '') {
                filterGames();
            }
        });
        document.getElementById('searchInput').addEventListener('keyup', (e) => {
            if (e.key === 'Enter') {
                filterGames();
            }
        });

        // 初始化：读取 Cookie 中的语言偏好
        const savedLang = getCookie('lang');
        if (savedLang && (savedLang === 'zh' || savedLang === 'en')) {
            currentLang = savedLang;
            document.querySelectorAll('.lang-btn').forEach(btn => {
                const lang = btn.getAttribute('data-lang');
                if (lang === savedLang) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            switchLanguage(savedLang);
        } else {
            renderGames();
        }
    </script>
</body>
</html>
